<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POLYPLASTICS — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #070810;
  --surface:  #0d0f1c;
  --card:     #121525;
  --card2:    #181c2e;
  --border:   #1e2438;
  --border2:  #262d47;
  --accent:   #6366f1;
  --accent2:  #4f46e5;
  --green:    #22d3a5;
  --amber:    #f59e0b;
  --red:      #f43f5e;
  --purple:   #a78bfa;
  --cyan:     #06b6d4;
  --text:     #e2e6f3;
  --text2:    #8b95b4;
  --text3:    #434d6a;
  --font-h:   'Syne', sans-serif;
  --font-b:   'Outfit', sans-serif;
  --font-m:   'DM Mono', monospace;
  --r:        10px;
  --r2:       16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.55;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
#app{display:flex;min-height:100vh;}
#sidebar{width:230px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;}
#content{padding:26px;flex:1;overflow-y:auto;}
.logo{padding:20px 18px 15px;border-bottom:1px solid var(--border);}
.logo-name{font-family:var(--font-h);font-weight:800;font-size:14px;color:var(--text);letter-spacing:2px;text-transform:uppercase;}
.logo-sub{font-family:var(--font-m);font-size:9px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.nav-section{padding:18px 14px 6px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;position:relative;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:rgba(99,102,241,.12);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:0;top:22%;height:56%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700;}
.sidebar-bottom{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border);}
.topbar-title{font-family:var(--font-h);font-weight:700;font-size:15px;color:var(--text);letter-spacing:.5px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:5px 12px 5px 5px;font-size:12px;color:var(--text2);}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.panel-title{font-family:var(--font-h);font-weight:700;font-size:21px;color:var(--text);margin-bottom:3px;}
.panel-sub{color:var(--text3);font-size:12px;margin-bottom:22px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s;}
.stat-card:hover{border-color:var(--c,var(--border2));}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle at 70% 30%,var(--c,transparent),transparent 70%);opacity:.08;}
.stat-value{font-family:var(--font-h);font-size:30px;font-weight:800;color:var(--c,var(--text));line-height:1;margin-bottom:4px;}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.stat-icon{position:absolute;right:14px;top:14px;font-size:20px;opacity:.2;}
.badge{display:inline-flex;align-items:center;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.badge-High{background:rgba(244,63,94,.12);color:#f43f5e;border:1px solid rgba(244,63,94,.22);}
.badge-Medium{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.22);}
.badge-Low{background:rgba(34,211,165,.12);color:#22d3a5;border:1px solid rgba(34,211,165,.22);}
.badge-todo{background:rgba(139,149,180,.1);color:#8b95b4;border:1px solid rgba(139,149,180,.18);}
.badge-inprog{background:rgba(99,102,241,.12);color:#6366f1;border:1px solid rgba(99,102,241,.22);}
.badge-review{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.22);}
.badge-done{background:rgba(34,211,165,.12);color:#22d3a5;border:1px solid rgba(34,211,165,.22);}
.badge-overdue{background:rgba(244,63,94,.18);color:#f43f5e;border:1px solid rgba(244,63,94,.3);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;font-family:var(--font-b);font-weight:600;cursor:pointer;transition:all .15s;font-size:13px;}
.btn-primary{background:var(--accent);color:#fff;padding:9px 18px;box-shadow:0 0 20px rgba(99,102,241,.25);}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:8px 15px;}
.btn-ghost:hover{background:var(--card);color:var(--text);}
.btn-danger{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.2);padding:7px 13px;}
.btn-success{background:rgba(34,211,165,.1);color:var(--green);border:1px solid rgba(34,211,165,.2);padding:7px 13px;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:76px;}
.form-select option{background:var(--card);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:26px;animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:var(--font-h);font-weight:700;font-size:17px;}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:var(--text);}
.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.task-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .15s;border-left:3px solid var(--lc,var(--border));cursor:pointer;margin-bottom:7px;}
.task-row:hover{background:var(--card2);border-color:var(--border2);}
.task-row-body{flex:1;min-width:0;}
.task-title{font-weight:600;font-size:13.5px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-meta{font-size:11px;color:var(--text3);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.task-actions{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.reply-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:7px;}
.reply-author{font-size:11px;font-weight:700;}
.reply-admin{color:var(--accent);}
.reply-user{color:var(--green);}
.reply-time{font-size:10px;color:var(--text3);margin-left:7px;}
.reply-text{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.6;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:620px;background:var(--surface);border-left:1px solid var(--border2);z-index:101;overflow-y:auto;padding:26px;animation:slideIn .2s ease;}
@keyframes slideIn{from{transform:translateX(50px);opacity:0;}to{transform:none;opacity:1;}}
.status-btn{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-b);}
.status-btn:hover,.status-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08);}
.progress-bar{background:var(--bg);border-radius:5px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:5px;transition:width .5s ease;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 0;border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;color:var(--text2);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card);color:var(--text);border:1px solid var(--border2);padding:11px 20px;border-radius:9px;font-weight:600;font-size:13px;z-index:9999;transition:transform .3s ease;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
#toast.show{transform:translateX(-50%) translateY(0);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.section-head{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
.empty{text-align:center;padding:44px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.link-chip{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.15);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--accent);font-family:var(--font-m);word-break:break-all;}
.fade-in{animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.db-status{display:flex;align-items:center;gap:5px;font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;}
.db-ok{background:rgba(34,211,165,.1);color:var(--green);border:1px solid rgba(34,211,165,.18);}
.db-err{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.18);}
.db-wait{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.18);}
.db-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.setup-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:26px;margin-top:16px;}
.step-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;align-items:center;justify-content:center;margin-right:7px;flex-shrink:0;}
.step-row{display:flex;align-items:flex-start;padding:7px 0;font-size:12px;color:var(--text2);line-height:1.6;}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kanban-col-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.kanban-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kanban-col-title{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1px;}
.kanban-count{margin-left:auto;background:var(--card2);border-radius:9px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--text2);}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:8px;cursor:pointer;transition:all .15s;border-left:3px solid var(--lc,var(--border));}
.kanban-card:hover{background:var(--card2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.kanban-card-title{font-weight:600;font-size:12px;color:var(--text);margin-bottom:6px;}
.kanban-card-meta{font-size:10px;color:var(--text3);}
@media(max-width:900px){#sidebar{width:56px;}.nav-item span,.nav-section,.logo-sub{display:none;}.logo-name{font-size:0;}.kanban{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){#content{padding:14px;}.stats-grid{grid-template-columns:1fr 1fr;}.kanban{grid-template-columns:1fr;}.drawer{max-width:100%;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo">
      <div class="logo-name">Polyplastics</div>
      <div class="logo-sub">Task Manager</div>
    </div>
    <div id="admin-nav" style="display:none">
      <div class="nav-section">Admin</div>
      <div class="nav-item" id="nav-dashboard" onclick="showPanel('dashboard')"><span class="nav-icon">⬡</span><span>Dashboard</span></div>
      <div class="nav-item" id="nav-tasks" onclick="showPanel('tasks')"><span class="nav-icon">◈</span><span>All Tasks</span><span class="nav-badge" id="overdue-badge" style="display:none">0</span></div>
      <div class="nav-item" id="nav-team" onclick="showPanel('team')"><span class="nav-icon">◉</span><span>Team</span></div>
      <div class="nav-item" id="nav-kanban" onclick="showPanel('kanban')"><span class="nav-icon">▦</span><span>Kanban</span></div>
      <div class="nav-section">Config</div>
      <div class="nav-item" id="nav-settings" onclick="showPanel('settings')"><span class="nav-icon">◎</span><span>Settings</span></div>
    </div>
    <div class="sidebar-bottom">
      <div class="nav-item" id="btn-logout" onclick="handleLogout()" style="display:none"><span class="nav-icon">⇥</span><span>Logout</span></div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">Loading…</div>
      <div class="topbar-right">
        <div id="db-indicator" class="db-status db-wait"><div class="db-dot"></div><span>Connecting…</span></div>
        <div id="topbar-user" style="display:none" class="user-chip">
          <div class="avatar" id="topbar-avatar">A</div>
          <span id="topbar-email" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">-</span>
        </div>
        <button id="btn-new-task" class="btn btn-primary btn-sm" onclick="openNewTaskModal()" style="display:none">+ New Task</button>
      </div>
    </div>
    <div id="content" class="fade-in" style="display:flex;align-items:center;justify-content:center;min-height:300px;">
      <div style="text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">⬡</div><div>Initialising…</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, arrayUnion
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ────────────────────────────────────────────────────────
const STATUSES   = ['To Do','In Progress','Review','Done'];
const PRIOS      = ['High','Medium','Low'];
const PRIO_CLR   = {High:'var(--red)',Medium:'var(--amber)',Low:'var(--green)'};
const STATUS_CLR = {'To Do':'var(--text3)','In Progress':'var(--accent)','Review':'var(--purple)','Done':'var(--green)'};
const PWD_KEY    = 'pp_admin_pwd';

let db = null, tasks = [], mode = 'boot';
let adminAuth = false, userEmail = '', activeId = null, taskUnsub = null, editId = null;

const uid      = () => Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const esc      = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt      = d  => d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
const fmtDT    = iso=> {const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});};
const today    = () => new Date().toISOString().slice(0,10);
const tomorrow = () => {const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};
const isOD     = t  => t.status!=='Done'&&t.due&&t.due<today();
const getTask  = id => tasks.find(t=>t.id===id);

function prioBadge(p){return `<span class="badge badge-${p}">${p}</span>`;}
function statusBadge(s){const m={'To Do':'badge-todo','In Progress':'badge-inprog','Review':'badge-review','Done':'badge-done'};return `<span class="badge ${m[s]||'badge-todo'}">${s}</span>`;}

function toast(msg,clr){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.borderColor=clr||'var(--border2)';
  el.classList.add('show');clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

function setDbIndicator(state){
  const el=document.getElementById('db-indicator');
  const labels={ok:'Live ✓',err:'Offline ✗',wait:'Connecting…'};
  const cls={ok:'db-ok',err:'db-err',wait:'db-wait'};
  el.className='db-status '+cls[state];
  el.innerHTML=`<div class="db-dot"></div><span>${labels[state]}</span>`;
}

function refreshOverdueBadge(){
  const n=tasks.filter(isOD).length;
  const el=document.getElementById('overdue-badge');
  if(el){el.textContent=n;el.style.display=n>0?'':'none';}
}

// ── Firebase ──────────────────────────────────────────────
function initFB(cfg){
  try{const app=initializeApp(cfg);db=getFirestore(app);return true;}
  catch(e){console.error(e);return false;}
}

function startListener(){
  if(taskUnsub)taskUnsub();
  const q=query(collection(db,'tasks'),orderBy('createdMs','desc'));
  taskUnsub=onSnapshot(q,snap=>{
    tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshOverdueBadge();
    onTasksUpdated();
    setDbIndicator('ok');
  },err=>{console.error(err);setDbIndicator('err');});
}

function onTasksUpdated(){
  if(mode==='admin'&&adminAuth){
    if(window._panel==='dashboard')renderDashboard();
    else if(window._panel==='tasks')renderTaskRows();
    else if(window._panel==='team')renderTeam();
    else if(window._panel==='kanban')renderKanban();
    if(document.getElementById('task-drawer')&&activeId)renderDrawerContent();
  } else if(mode==='user'){
    if(activeId)renderUserTaskDetail(document.getElementById('content'),activeId);
    else renderUserDashboard(document.getElementById('content'));
  }
}

async function dbCreate(data){
  return await addDoc(collection(db,'tasks'),{...data,replies:[],createdMs:Date.now(),createdDate:today()});
}
async function dbUpdate(id,data){await updateDoc(doc(db,'tasks',id),data);}
async function dbDelete(id){await deleteDoc(doc(db,'tasks',id));}
async function dbAddReply(id,reply){await updateDoc(doc(db,'tasks',id),{replies:arrayUnion(reply)});}

// ── URL params ────────────────────────────────────────────
function detectMode(){
  const p=new URLSearchParams(window.location.search);
  const u=p.get('user');
  if(u){userEmail=decodeURIComponent(u).toLowerCase().trim();mode='user';return true;}
  mode='admin';return false;
}

function userLink(email){return window.location.href.split('?')[0]+'?user='+encodeURIComponent(email.toLowerCase());}

// ── Boot ──────────────────────────────────────────────────
async function boot(){
  const raw=localStorage.getItem('fb_config');
  if(!raw){renderSetup();return;}
  let cfg;try{cfg=JSON.parse(raw);}catch{renderSetup();return;}
  if(!initFB(cfg)){renderSetup();return;}
  setDbIndicator('wait');
  const isUser=detectMode();
  if(isUser){
    showUserShell();
    startListener();
  } else {
    renderAdminLogin();
  }
}

window._panel='dashboard';

// ── Dashboard ─────────────────────────────────────────────
function renderDashboard(){
  const total=tasks.length,todo=tasks.filter(t=>t.status==='To Do').length,
        inprog=tasks.filter(t=>t.status==='In Progress').length,
        review=tasks.filter(t=>t.status==='Review').length,

  const recent=tasks.filter(t=>(t.replies||[]).length>0)

  c.innerHTML=`
  <div class="fade-in">
    <div class="panel-title">Dashboard</div>
    <div class="panel-sub">Real-time — updates the moment employees reply</div>

      <div class="stat-card" style="--c:var(--text3)"><div class="stat-icon">○</div><div class="stat-value">${todo}</div><div class="stat-label">To Do</div></div>

      <div class="stat-card" style="--c:var(--red)"><div class="stat-icon">!</div><div class="stat-value">${overdue}</div><div class="stat-label">Overdue</div></div>

    ${newReplies>0?`<div style="background:rgba(34,211,165,.08);border:1px solid rgba(34,211,165,.2);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="showPanel('tasks')">
      <span style="font-size:18px">💬</span>
      <div><strong style="color:var(--green)">${newReplies} new ${newReplies===1?'reply':'replies'}</strong> <span style="color:var(--text2);font-size:12px">from employees since your last visit</span></div>
      <span style="margin-left:auto;color:var(--accent);font-size:12px">View →</span>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <div class="section-head" style="margin-bottom:10px">Completion Rate</div>
        <div style="font-family:var(--font-h);font-size:40px;font-weight:800;color:var(--green)">${rate}%</div>
        <div class="progress-bar" style="height:7px;margin:8px 0"><div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div></div>
        <div style="font-size:10px;color:var(--text3)">${done} of ${total} tasks completed</div>
      </div>
      <div class="card">
        <div class="section-head" style="margin-bottom:10px">Status Breakdown</div>
        ${STATUSES.map(s=>{const n=tasks.filter(t=>t.status===s).length;const pct=total?Math.round(n/total*100):0;return`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px"><span>${s}</span><span style="color:${STATUS_CLR[s]}">${n}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${STATUS_CLR[s]}"></div></div></div>`;}).join('')}

let tf={status:'All',priority:'All',search:''};
function renderTasks(){
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">All Tasks</div>
  <div class="panel-sub">${tasks.length} tasks — click any task to open details</div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap" class="fade-in">
    <input id="tf-s" class="form-input" style="max-width:240px;padding:8px 12px" placeholder="🔍 Search tasks or people…" value="${esc(tf.search)}" oninput="tf.search=this.value;renderTaskRows()"/>
    <select id="tf-st" class="form-select" style="max-width:145px" onchange="tf.status=this.value;renderTaskRows()"><option>All</option>${STATUSES.map(s=>`<option${tf.status===s?' selected':''}>${s}</option>`).join('')}</select>
    <select id="tf-pr" class="form-select" style="max-width:125px" onchange="tf.priority=this.value;renderTaskRows()"><option>All</option>${PRIOS.map(p=>`<option${tf.priority===p?' selected':''}>${p}</option>`).join('')}</select>
    <button class="btn btn-ghost btn-sm" onclick="tf={status:'All',priority:'All',search:''};renderTasks()">Reset</button>
  </div>
  <div id="task-rows" class="fade-in"></div>`;
  renderTaskRows();
}
function renderTaskRows(){
  const filt=tasks.filter(t=>{
    const s=tf.status==='All'||t.status===tf.status;
    const p=tf.priority==='All'||t.priority===tf.priority;
    const q=!tf.search||t.title.toLowerCase().includes(tf.search.toLowerCase())||(t.assignee||'').toLowerCase().includes(tf.search.toLowerCase());
    return s&&p&&q;
  });
  const el=document.getElementById('task-rows');if(!el)return;
  if(!filt.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>No tasks match filters</div></div>';return;}
  const lastSeen=parseInt(localStorage.getItem('adm_seen')||'0');
  el.innerHTML=filt.map(t=>{
    const nr=(t.replies||[]).filter(r=>r.author!=='Admin'&&new Date(r.time).getTime()>lastSeen).length;
    return`<div class="task-row" style="--lc:${PRIO_CLR[t.priority]}" onclick="openDrawer('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${esc(t.title)}${nr>0?`<span style="background:var(--green);color:#000;font-size:9px;font-weight:700;border-radius:9px;padding:1px 6px;margin-left:7px;vertical-align:middle">${nr} new</span>`:''}</div>
        <div class="task-meta">
          <span>👤 ${esc(t.assignee)}</span>
          <span>📅 <span style="color:${isOD(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${(t.replies||[]).length?`<span>💬 ${t.replies.length}</span>`:''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        ${prioBadge(t.priority)} ${statusBadge(t.status)}
        ${isOD(t)?'<span class="badge badge-overdue">Overdue</span>':''}
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}')">✏</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

        <div style="color:var(--green);margin-top:4px">✅ Replies sync instantly to your dashboard via Firebase — zero manual steps.</div>
      </div>
    </div>
  </div>`;
}
window.changePwd=function(){
  const cur=document.getElementById('pc').value,nw=document.getElementById('pn').value,cn=document.getElementById('pm').value;
  const stored=localStorage.getItem(PWD_KEY)||'admin123';const msg=document.getElementById('pmsg');
  if(cur!==stored){msg.style.color='var(--red)';msg.textContent='❌ Current password incorrect';return;}
  if(nw.length<6){msg.style.color='var(--red)';msg.textContent='❌ Min 6 characters';return;}
  if(nw!==cn){msg.style.color='var(--red)';msg.textContent='❌ Passwords do not match';return;}
  localStorage.setItem(PWD_KEY,nw);msg.style.color='var(--green)';msg.textContent='✅ Password updated';
  ['pc','pn','pm'].forEach(id=>document.getElementById(id).value='');toast('Password updated!');
};

// ── Task Modal ────────────────────────────────────────────
window.openNewTaskModal=()=>{editId=null;openTaskModal();};
window.openEditModal=id=>{editId=id;openTaskModal();};
function openTaskModal(){
  const t=editId?getTask(editId):null;
  const html=`<div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">${t?'Edit Task':'+ New Task'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Task Title *</label><input id="tm-ti" class="form-input" value="${esc(t?.title||'')}" placeholder="e.g. Submit monthly report"/></div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="tm-de" class="form-textarea">${esc(t?.desc||'')}</textarea></div>
    <div class="form-group"><label class="form-label">Assign To (Email) *</label><input id="tm-as" class="form-input" type="email" value="${esc(t?.assignee||'')}" placeholder="employee@polyplastics.com"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Priority</label><select id="tm-pr" class="form-select">${PRIOS.map(p=>`<option${t?.priority===p?' selected':''}>${p}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Status</label><select id="tm-st" class="form-select">${STATUSES.map(s=>`<option${t?.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Due Date *</label><input id="tm-du" class="form-input" type="date" value="${t?.due||tomorrow()}"/></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTask()">${t?'Update Task':'Create Task'}</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
window.closeModal=()=>document.getElementById('task-modal')?.remove();
window.saveTask=async function(){
  const title=document.getElementById('tm-ti').value.trim();
  const assignee=document.getElementById('tm-as').value.trim().toLowerCase();
  const due=document.getElementById('tm-du').value;
  if(!title||!assignee||!due){toast('Title, email & due date required','var(--red)');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(assignee)){toast('Invalid email','var(--red)');return;}
  const data={title,desc:document.getElementById('tm-de').value.trim(),assignee,priority:document.getElementById('tm-pr').value,status:document.getElementById('tm-st').value,due};
  try{
    if(editId){await dbUpdate(editId,data);toast('Task updated!');}
    else{await dbCreate(data);const lnk=userLink(assignee);showLinkModal(assignee,lnk);toast('Task created!');}
    closeModal();
  }catch(e){toast('Error: '+e.message,'var(--red)');}
};

function showLinkModal(email,link){
  const safe=link.replace(/'/g,"\\'");
  const html=`<div class="modal-overlay" id="link-modal" onclick="if(event.target===this)document.getElementById('link-modal').remove()">
  <div class="modal" style="max-width:460px">
    <div class="modal-header"><div class="modal-title">✅ Task Created</div><button class="modal-close" onclick="document.getElementById('link-modal').remove()">✕</button></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Share this link with <strong style="color:var(--accent)">${esc(email)}</strong> — they'll see only their own tasks and can reply directly.</div>
    <div class="link-chip" style="margin-bottom:14px">${esc(link)}</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" onclick="copyText('${safe}','Link copied!');document.getElementById('lmc').textContent='✅ Copied!'">📋 Copy Link</button>
      <span id="lmc" style="font-size:12px;font-weight:600;color:var(--green)"></span>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="document.getElementById('link-modal').remove()">Close</button>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text3)">💡 This link is unique to ${esc(email)}. Their replies appear on your admin dashboard instantly.</div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

// ── Admin Drawer ──────────────────────────────────────────
window.openDrawer=function(id){
  const t=getTask(id);if(!t){toast('Task not found','var(--red)');return;}
  activeId=id;
  document.getElementById('drawer-overlay')?.remove();
  document.getElementById('task-drawer')?.remove();
  const ov=document.createElement('div');ov.className='drawer-overlay';ov.id='drawer-overlay';ov.onclick=closeDrawer;
  const dr=document.createElement('div');dr.className='drawer';dr.id='task-drawer';
  document.body.appendChild(ov);document.body.appendChild(dr);
  renderDrawerContent();
};
window.closeDrawer=function closeDrawer(){
  document.getElementById('drawer-overlay')?.remove();
  document.getElementById('task-drawer')?.remove();
  activeId=null;
};
function renderDrawerContent(){
  const t=getTask(activeId);if(!t){closeDrawer();return;}
  const dr=document.getElementById('task-drawer');if(!dr)return;
  dr.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div style="flex:1;min-width:0;padding-right:12px">
      <div style="font-family:var(--font-h);font-weight:700;font-size:18px;color:var(--text);margin-bottom:7px;line-height:1.3">${esc(t.title)}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${prioBadge(t.priority)} ${statusBadge(t.status)} ${isOD(t)?'<span class="badge badge-overdue">Overdue</span>':''}</div>
    </div>
    <div style="display:flex;gap:5px;flex-shrink:0">
      <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}')">✏</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDelete('${t.id}')">🗑</button>
      <button class="modal-close" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="card-sm" style="margin-bottom:12px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
      ${[['Assigned To',t.assignee],['Due Date',fmt(t.due)],['Priority',t.priority],['Status',t.status]].map(([k,v])=>`<div><div class="section-head">${k}</div><div style="font-size:12px;color:var(--text)">${esc(v)}</div></div>`).join('')}
    </div>
  </div>
  ${t.desc?`<div class="card-sm" style="margin-bottom:12px"><div class="section-head">Description</div><div style="font-size:12px;color:var(--text2);line-height:1.6;margin-top:4px">${esc(t.desc)}</div></div>`:''}
  <div style="margin-bottom:12px">
    <div class="section-head" style="margin-bottom:7px">Change Status</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${STATUSES.map(s=>`<button class="status-btn${t.status===s?' active':''}" onclick="changeStatus('${t.id}','${s}')">${s}</button>`).join('')}</div>
  </div>
  <div style="margin-bottom:12px">
    <div class="section-head" style="margin-bottom:10px">💬 Conversation (${(t.replies||[]).length})</div>
    ${(t.replies||[]).map(r=>`<div class="reply-item"><span class="reply-author ${r.author==='Admin'?'reply-admin':'reply-user'}">${esc(r.author)}</span><span class="reply-time">${fmtDT(r.time)}</span>${r.text?`<div class="reply-text">${esc(r.text)}</div>`:''}</div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:6px 0">No messages yet.</div>'}
  </div>
  <div class="card-sm" style="margin-bottom:12px">
    <div class="section-head" style="margin-bottom:8px">Admin Reply</div>
    <textarea id="dr-rt" class="form-textarea" rows="2" placeholder="Write a comment or update for the employee…"></textarea>
    <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="submitAdminReply('${t.id}')">Send →</button>
  </div>
  <div class="card-sm" style="background:var(--bg)">
    <div class="section-head" style="margin-bottom:6px">🔗 Employee Link</div>
    <div class="link-chip" style="margin-bottom:8px">${esc(userLink(t.assignee))}</div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:7px">Assignee sees only their tasks. Replies sync here instantly.</div>
    <button class="btn btn-ghost btn-sm" onclick="copyText('${userLink(t.assignee).replace(/'/g,"\\'")}','Link copied!')">📋 Copy</button>
  </div>`;
}
window.changeStatus=async function(id,s){try{await dbUpdate(id,{status:s});toast('Status → '+s);}catch(e){toast('Error: '+e.message,'var(--red)');}};
window.submitAdminReply=async function(id){
  const text=document.getElementById('dr-rt')?.value.trim();
  if(!text){toast('Please write a reply','var(--amber)');return;}
  const reply={id:uid(),author:'Admin',text,time:new Date().toISOString()};
  try{await dbAddReply(id,reply);toast('Reply sent!');}catch(e){toast('Error: '+e.message,'var(--red)');}
};
window.confirmDelete=async function(id){
  if(!confirm('Delete this task permanently?'))return;
  try{await dbDelete(id);closeDrawer();toast('Task deleted','var(--red)');}catch(e){toast('Error: '+e.message,'var(--red)');}
};

// ── User Dashboard ────────────────────────────────────────
function renderUserDashboard(c){
  const my=tasks.filter(t=>(t.assignee||'').toLowerCase()===userEmail);
  const done=my.filter(t=>t.status==='Done').length;
  const inprog=my.filter(t=>t.status==='In Progress').length;
  const overdue=my.filter(isOD).length;
  const rate=my.length?Math.round(done/my.length*100):0;
  c.innerHTML=`
  <div class="fade-in">
    <div class="panel-title">My Tasks</div>
    <div class="panel-sub">Welcome, <strong style="color:var(--accent)">${esc(userEmail)}</strong> — ${my.length} task${my.length!==1?'s':''} assigned to you</div>
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--accent)"><div class="stat-icon">◈</div><div class="stat-value">${my.length}</div><div class="stat-label">My Tasks</div></div>
      <div class="stat-card" style="--c:var(--accent)"><div class="stat-icon">⟳</div><div class="stat-value">${inprog}</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card" style="--c:var(--green)"><div class="stat-icon">✓</div><div class="stat-value">${done}</div><div class="stat-label">Done</div></div>
      <div class="stat-card" style="--c:var(--red)"><div class="stat-icon">!</div><div class="stat-value">${overdue}</div><div class="stat-label">Overdue</div></div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:13px 16px">
      <div class="section-head" style="margin-bottom:5px">Overall Progress</div>
      <div class="progress-bar" style="height:8px;margin:7px 0"><div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div></div>
      <div style="font-size:10px;color:var(--text3)">${done} of ${my.length} tasks completed</div>
    </div>
    ${my.length===0?'<div class="empty"><div class="empty-icon">🎉</div><div>No tasks assigned yet!</div></div>':
    [...my].sort((a,b)=>(a.due||'').localeCompare(b.due||'')).map(t=>`
    <div class="task-row" style="--lc:${PRIO_CLR[t.priority]}" onclick="openUserTask('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span>📅 <span style="color:${isOD(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${(t.replies||[]).length?`<span>💬 ${t.replies.length} repl${t.replies.length!==1?'ies':'y'}</span>`:''}
          ${isOD(t)?'<span style="color:var(--red);font-weight:700">Overdue!</span>':''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">${prioBadge(t.priority)} ${statusBadge(t.status)}</div>
    </div>`).join('')}
  </div>`;
}

window.openUserTask=function(id){activeId=id;renderUserTaskDetail(document.getElementById('content'),id);};

function renderUserTaskDetail(c,id){
  const t=getTask(id);
  if(!t){activeId=null;renderUserDashboard(c);return;}
  c.innerHTML=`
  <div class="fade-in">
    <div style="margin-bottom:14px"><button class="btn btn-ghost btn-sm" onclick="goBackUserDash()">← My Tasks</button></div>
    <div style="max-width:660px">
      <div style="font-family:var(--font-h);font-weight:700;font-size:19px;color:var(--text);margin-bottom:8px;line-height:1.3">${esc(t.title)}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px">${prioBadge(t.priority)} ${statusBadge(t.status)} ${isOD(t)?'<span class="badge badge-overdue">Overdue</span>':''}</div>

      <div class="card" style="margin-bottom:12px;padding:14px 16px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px">
          ${[['Assigned To',t.assignee],['Due Date',fmt(t.due)],['Priority',t.priority],['Status',t.status]].map(([k,v])=>`<div><div class="section-head">${k}</div><div style="font-size:12px;color:var(--text)">${esc(v)}</div></div>`).join('')}
        </div>
      </div>

      ${t.desc?`<div class="card" style="margin-bottom:12px;padding:14px 16px"><div class="section-head" style="margin-bottom:5px">Description</div><div style="font-size:13px;color:var(--text2);line-height:1.7">${esc(t.desc)}</div></div>`:''}

      <div class="card" style="margin-bottom:12px;padding:14px 16px">
        <div class="section-head" style="margin-bottom:8px">Update Status</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${STATUSES.map(s=>`<button class="status-btn${t.status===s?' active':''}" onclick="userUpdateStatus('${t.id}','${s}')">${s}</button>`).join('')}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:7px">Admin sees your status change instantly.</div>
      </div>

      <div class="card" style="margin-bottom:12px;padding:14px 16px">
        <div class="section-head" style="margin-bottom:11px">💬 Conversation (${(t.replies||[]).length})</div>
        ${(t.replies||[]).map(r=>`<div class="reply-item"><span class="reply-author ${r.author==='Admin'?'reply-admin':'reply-user'}">${esc(r.author)}</span><span class="reply-time">${fmtDT(r.time)}</span>${r.text?`<div class="reply-text">${esc(r.text)}</div>`:''}</div>`).join('')||'<div style="color:var(--text3);font-size:12px">No messages yet. Add an update below.</div>'}
      </div>

      <div class="card" style="padding:14px 16px">
        <div class="section-head" style="margin-bottom:10px">✏ Add Update / Reply</div>
        <textarea id="ur-text" class="form-textarea" rows="3" placeholder="Share your progress, ask a question, or leave a note…"></textarea>
        <div style="margin-top:10px;display:flex;align-items:center;gap:12px">
          <button class="btn btn-primary" onclick="submitUserReply('${t.id}')">Send Reply →</button>
          <span style="font-size:11px;color:var(--text3)">Appears on admin dashboard instantly.</span>
        </div>
      </div>
    </div>
  </div>`;
}

window.goBackUserDash=function(){activeId=null;renderUserDashboard(document.getElementById('content'));};
window.userUpdateStatus=async function(id,s){
  try{await dbUpdate(id,{status:s});toast('Status updated: '+s);}catch(e){toast('Error: '+e.message,'var(--red)');}
};
window.submitUserReply=async function(id){
  const text=document.getElementById('ur-text')?.value.trim();
  if(!text){toast('Please write a reply','var(--amber)');return;}
  const t=getTask(id);
  const reply={id:uid(),author:t?.assignee||userEmail,text,time:new Date().toISOString()};
  try{await dbAddReply(id,reply);toast('Reply sent! Admin will see it now.');}catch(e){toast('Error: '+e.message,'var(--red)');}
};

// ── Utilities ─────────────────────────────────────────────
window.copyText=function(text,msg){
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(text).then(()=>toast(msg||'Copied!')).catch(()=>prompt('Copy:',text));}
  else{prompt('Copy:',text);}
};
window.handleLogout=function(){
  if(!confirm('Log out?'))return;
  if(mode==='user'){window.location.href=window.location.href.split('?')[0];}
  else{adminAuth=false;if(taskUnsub){taskUnsub();taskUnsub=null;}
    document.getElementById('admin-nav').style.display='none';
    document.getElementById('btn-new-task').style.display='none';
    document.getElementById('btn-logout').style.display='none';
    document.getElementById('topbar-user').style.display='none';
    tasks=[];renderAdminLogin();}
};

boot();
</script>
</body>
</html>
