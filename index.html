<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Minutes Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
        .status-in-progress {
            background-color: #dbeafe;
            color: #1e40af;
        }
        .status-completed {
            background-color: #dcfce7;
            color: #166534;
        }
        .meeting-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border-left-width: 4px;
            border-left-color: #e5e7eb;
        }
        .meeting-card:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .meeting-card.active {
            border-left-color: #2563eb;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script type="module">
        const { useState } = React;

        const MeetingMinutesApp = () => {
            const [activeTab, setActiveTab] = useState('minutes');
            const [meetings, setMeetings] = useState([
                {
                    id: 1,
                    number: '05 | 2025-26',
                    date: '2026-02-24',
                    endDate: '2026-02-25',
                    venue: 'Virtual',
                    attendees: ['Kamal Gupta', 'Kapil Gupta', 'Sanjeev Singla', 'Ravinder Pandita'],
                    tasks: [
                        { id: 1, title: 'Review QRM effectiveness', assignedTo: 'Kamal Gupta', status: 'in-progress', dueDate: '2026-03-05' },
                        { id: 2, title: 'Prepare plant analysis', assignedTo: 'Kapil Gupta', status: 'pending', dueDate: '2026-03-10' },
                    ],
                    notes: 'Discussion on operational effectiveness and process improvements'
                },
            ]);

            const [showMeetingForm, setShowMeetingForm] = useState(false);
            const [showTaskForm, setShowTaskForm] = useState(false);
            const [selectedMeeting, setSelectedMeeting] = useState(null);
            const [formData, setFormData] = useState({
                number: '',
                date: '',
                endDate: '',
                venue: '',
                attendees: '',
                notes: ''
            });

            const [taskForm, setTaskForm] = useState({
                title: '',
                assignedTo: '',
                dueDate: '',
                status: 'pending'
            });

            const handleAddMeeting = () => {
                if (formData.number && formData.date) {
                    const newMeeting = {
                        id: meetings.length + 1,
                        ...formData,
                        attendees: formData.attendees.split(',').map(a => a.trim()),
                        tasks: []
                    };
                    setMeetings([...meetings, newMeeting]);
                    setFormData({ number: '', date: '', endDate: '', venue: '', attendees: '', notes: '' });
                    setShowMeetingForm(false);
                }
            };

            const handleAddTask = (meetingId) => {
                if (taskForm.title && taskForm.assignedTo) {
                    const updatedMeetings = meetings.map(m => {
                        if (m.id === meetingId) {
                            return {
                                ...m,
                                tasks: [...m.tasks, { id: m.tasks.length + 1, ...taskForm }]
                            };
                        }
                        return m;
                    });
                    setMeetings(updatedMeetings);
                    setTaskForm({ title: '', assignedTo: '', dueDate: '', status: 'pending' });
                    setShowTaskForm(false);
                }
            };

            const handleDeleteTask = (meetingId, taskId) => {
                const updatedMeetings = meetings.map(m => {
                    if (m.id === meetingId) {
                        return {
                            ...m,
                            tasks: m.tasks.filter(t => t.id !== taskId)
                        };
                    }
                    return m;
                });
                setMeetings(updatedMeetings);
            };

            const handleDeleteMeeting = (id) => {
                setMeetings(meetings.filter(m => m.id !== id));
                setSelectedMeeting(null);
            };

            const exportToCSV = () => {
                if (!selectedMeeting) return;
                
                let csvContent = 'Meeting Minutes Export\n\n';
                csvContent += `Meeting No.,${selectedMeeting.number}\n`;
                csvContent += `Date,${selectedMeeting.date}\n`;
                csvContent += `End Date,${selectedMeeting.endDate}\n`;
                csvContent += `Venue,${selectedMeeting.venue}\n\n`;
                
                csvContent += 'Attendees\n';
                selectedMeeting.attendees.forEach(a => csvContent += `${a}\n`);
                
                csvContent += '\nTasks\n';
                csvContent += 'Task Title,Assigned To,Status,Due Date\n';
                selectedMeeting.tasks.forEach(t => {
                    csvContent += `${t.title},${t.assignedTo},${t.status},${t.dueDate}\n`;
                });
                
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csvContent));
                element.setAttribute('download', `Minutes_${selectedMeeting.number}.csv`);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            const exportToPDF = () => {
                if (!selectedMeeting) return;
                
                let pdfContent = `Meeting Minutes\n\n`;
                pdfContent += `Meeting No: ${selectedMeeting.number}\n`;
                pdfContent += `Date: ${selectedMeeting.date} to ${selectedMeeting.endDate}\n`;
                pdfContent += `Venue: ${selectedMeeting.venue}\n\n`;
                pdfContent += `Attendees:\n${selectedMeeting.attendees.join(', ')}\n\n`;
                pdfContent += `Notes:\n${selectedMeeting.notes}\n\n`;
                pdfContent += `Tasks:\n`;
                selectedMeeting.tasks.forEach(t => {
                    pdfContent += `- ${t.title}\n  Assigned to: ${t.assignedTo}\n  Status: ${t.status}\n  Due: ${t.dueDate}\n\n`;
                });
                
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(pdfContent));
                element.setAttribute('download', `Minutes_${selectedMeeting.number}.txt`);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'completed': return 'status-completed';
                    case 'in-progress': return 'status-in-progress';
                    case 'pending': return 'status-pending';
                    default: return 'bg-gray-100 text-gray-800';
                }
            };

            return (
                <div className="flex h-screen bg-gray-50">
                    {/* Sidebar */}
                    <div className="sidebar w-64 text-white shadow-xl flex flex-col">
                        <div className="p-6 border-b border-gray-700">
                            <h1 className="text-2xl font-bold text-white tracking-tight">MeetFlow</h1>
                            <p className="text-xs text-gray-400 mt-1">Meeting Minutes Management</p>
                        </div>

                        <nav className="mt-8 px-4 space-y-2 flex-1">
                            <button
                                onClick={() => setActiveTab('minutes')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all ${
                                    activeTab === 'minutes'
                                        ? 'bg-blue-600 text-white shadow-lg'
                                        : 'text-gray-300 hover:bg-gray-700'
                                }`}
                            >
                                <span className="font-medium">📄 Meeting Minutes</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('tasks')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all ${
                                    activeTab === 'tasks'
                                        ? 'bg-blue-600 text-white shadow-lg'
                                        : 'text-gray-300 hover:bg-gray-700'
                                }`}
                            >
                                <span className="font-medium">✓ Assigned Tasks</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('attendees')}
                                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all ${
                                    activeTab === 'attendees'
                                        ? 'bg-blue-600 text-white shadow-lg'
                                        : 'text-gray-300 hover:bg-gray-700'
                                }`}
                            >
                                <span className="font-medium">👥 Attendees</span>
                            </button>
                        </nav>

                        <div className="p-4 border-t border-gray-700">
                            <button
                                onClick={() => setShowMeetingForm(true)}
                                className="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-medium transition-all shadow-lg"
                            >
                                <span>➕ New Meeting</span>
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto">
                        <div className="max-w-6xl mx-auto p-8">
                            {/* Header */}
                            <div className="mb-8">
                                <h2 className="text-4xl font-bold text-gray-900 mb-2">
                                    {activeTab === 'minutes' && 'Meeting Minutes'}
                                    {activeTab === 'tasks' && 'Task Management'}
                                    {activeTab === 'attendees' && 'Attendee Records'}
                                </h2>
                                <p className="text-gray-600">
                                    {activeTab === 'minutes' && `Manage ${meetings.length} meeting record(s)`}
                                    {activeTab === 'tasks' && 'Track and manage assigned tasks'}
                                    {activeTab === 'attendees' && 'View attendee information'}
                                </p>
                            </div>

                            {/* Minutes Tab */}
                            {activeTab === 'minutes' && (
                                <div className="space-y-6">
                                    {meetings.length === 0 ? (
                                        <div className="bg-white rounded-lg border-2 border-dashed border-gray-300 p-12 text-center">
                                            <p className="text-gray-600 font-medium">No meetings recorded yet</p>
                                        </div>
                                    ) : (
                                        <div className="grid gap-6">
                                            {meetings.map(meeting => (
                                                <div
                                                    key={meeting.id}
                                                    onClick={() => setSelectedMeeting(meeting)}
                                                    className={`meeting-card bg-white rounded-lg shadow-md p-6 ${
                                                        selectedMeeting?.id === meeting.id ? 'active' : ''
                                                    }`}
                                                >
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <h3 className="text-xl font-bold text-gray-900">
                                                                Meeting #{meeting.number}
                                                            </h3>
                                                            <p className="text-sm text-gray-500 mt-1">
                                                                {meeting.date} {meeting.endDate && `to ${meeting.endDate}`}
                                                            </p>
                                                        </div>
                                                        <button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                handleDeleteMeeting(meeting.id);
                                                            }}
                                                            className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-all"
                                                        >
                                                            🗑️
                                                        </button>
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                                        <div>
                                                            <p className="text-xs text-gray-500 uppercase tracking-wide">Venue</p>
                                                            <p className="text-gray-700 font-medium">{meeting.venue}</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-xs text-gray-500 uppercase tracking-wide">Attendees</p>
                                                            <p className="text-gray-700 font-medium">{meeting.attendees.length} people</p>
                                                        </div>
                                                    </div>

                                                    <div className="flex justify-between items-center pt-4 border-t border-gray-200">
                                                        <span className="text-xs bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-medium">
                                                            {meeting.tasks.length} Task(s)
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Selected Meeting Details */}
                            {selectedMeeting && (
                                <div className="mt-8 grid grid-cols-3 gap-6">
                                    {/* Main Details */}
                                    <div className="col-span-2 space-y-6">
                                        {/* Meeting Info Card */}
                                        <div className="bg-white rounded-lg shadow-md p-6 border-l-4 border-blue-600">
                                            <h3 className="text-lg font-bold text-gray-900 mb-4">Meeting Details</h3>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div>
                                                    <p className="text-xs text-gray-500 uppercase tracking-wide mb-1">Meeting Number</p>
                                                    <p className="text-lg font-semibold text-gray-900">{selectedMeeting.number}</p>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-gray-500 uppercase tracking-wide mb-1">Venue</p>
                                                    <p className="text-lg font-semibold text-gray-900">{selectedMeeting.venue}</p>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-gray-500 uppercase tracking-wide mb-1">Start Date</p>
                                                    <p className="text-lg font-semibold text-gray-900">{selectedMeeting.date}</p>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-gray-500 uppercase tracking-wide mb-1">End Date</p>
                                                    <p className="text-lg font-semibold text-gray-900">{selectedMeeting.endDate}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Tasks Section */}
                                        <div className="bg-white rounded-lg shadow-md p-6 border-l-4 border-green-600">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-lg font-bold text-gray-900">Assigned Tasks</h3>
                                                <button
                                                    onClick={() => setShowTaskForm(true)}
                                                    className="flex items-center space-x-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-all text-sm font-medium"
                                                >
                                                    <span>➕ Add Task</span>
                                                </button>
                                            </div>

                                            {selectedMeeting.tasks.length === 0 ? (
                                                <div className="bg-gray-50 rounded-lg p-8 text-center">
                                                    <p className="text-gray-600 font-medium">No tasks assigned</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-3">
                                                    {selectedMeeting.tasks.map(task => (
                                                        <div key={task.id} className="bg-gray-50 rounded-lg p-4 hover:bg-gray-100 transition-all">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <div className="flex-1">
                                                                    <h4 className="font-semibold text-gray-900">{task.title}</h4>
                                                                    <p className="text-sm text-gray-600 mt-1">Assigned to: <span className="font-medium">{task.assignedTo}</span></p>
                                                                </div>
                                                                <button
                                                                    onClick={() => handleDeleteTask(selectedMeeting.id, task.id)}
                                                                    className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-all ml-2"
                                                                >
                                                                    🗑️
                                                                </button>
                                                            </div>
                                                            <div className="flex justify-between items-center">
                                                                <span className={`status-badge ${getStatusColor(task.status)}`}>
                                                                    {task.status.replace('-', ' ').toUpperCase()}
                                                                </span>
                                                                <span className="text-xs text-gray-500">Due: {task.dueDate}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Sidebar Actions */}
                                    <div className="space-y-4">
                                        <div className="bg-white rounded-lg shadow-md p-6 border-l-4 border-purple-600">
                                            <h3 className="text-lg font-bold text-gray-900 mb-4">Attendees</h3>
                                            <div className="space-y-2">
                                                {selectedMeeting.attendees.map((attendee, idx) => (
                                                    <div key={idx} className="flex items-center space-x-2 text-gray-700">
                                                        <div className="w-2 h-2 bg-purple-600 rounded-full"></div>
                                                        <span className="text-sm">{attendee}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-lg shadow-md p-6 border-l-4 border-orange-600">
                                            <h3 className="text-lg font-bold text-gray-900 mb-4">Export Minutes</h3>
                                            <div className="space-y-3">
                                                <button
                                                    onClick={exportToCSV}
                                                    className="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all text-sm font-medium"
                                                >
                                                    <span>⬇️ CSV</span>
                                                </button>
                                                <button
                                                    onClick={exportToPDF}
                                                    className="w-full flex items-center justify-center space-x-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-all text-sm font-medium"
                                                >
                                                    <span>⬇️ TXT</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Task Form Modal */}
                            {showTaskForm && selectedMeeting && (
                                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                    <div className="bg-white rounded-lg shadow-xl p-8 max-w-md w-full mx-4">
                                        <h3 className="text-2xl font-bold text-gray-900 mb-6">Add Task</h3>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Task Title</label>
                                                <input
                                                    type="text"
                                                    value={taskForm.title}
                                                    onChange={(e) => setTaskForm({...taskForm, title: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    placeholder="Enter task title"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Assign To</label>
                                                <select
                                                    value={taskForm.assignedTo}
                                                    onChange={(e) => setTaskForm({...taskForm, assignedTo: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                >
                                                    <option value="">Select attendee</option>
                                                    {selectedMeeting.attendees.map((attendee, idx) => (
                                                        <option key={idx} value={attendee}>{attendee}</option>
                                                    ))}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Due Date</label>
                                                <input
                                                    type="date"
                                                    value={taskForm.dueDate}
                                                    onChange={(e) => setTaskForm({...taskForm, dueDate: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Status</label>
                                                <select
                                                    value={taskForm.status}
                                                    onChange={(e) => setTaskForm({...taskForm, status: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                >
                                                    <option value="pending">Pending</option>
                                                    <option value="in-progress">In Progress</option>
                                                    <option value="completed">Completed</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="flex space-x-3 mt-8">
                                            <button
                                                onClick={() => setShowTaskForm(false)}
                                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-all"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                onClick={() => handleAddTask(selectedMeeting.id)}
                                                className="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-all"
                                            >
                                                Add Task
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Meeting Form Modal */}
                            {showMeetingForm && (
                                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                    <div className="bg-white rounded-lg shadow-xl p-8 max-w-2xl w-full mx-4">
                                        <h3 className="text-2xl font-bold text-gray-900 mb-6">Create New Meeting</h3>
                                        
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Meeting Number</label>
                                                <input
                                                    type="text"
                                                    value={formData.number}
                                                    onChange={(e) => setFormData({...formData, number: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    placeholder="e.g., 05 | 2025-26"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Venue</label>
                                                <input
                                                    type="text"
                                                    value={formData.venue}
                                                    onChange={(e) => setFormData({...formData, venue: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    placeholder="e.g., Virtual"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                                                <input
                                                    type="date"
                                                    value={formData.date}
                                                    onChange={(e) => setFormData({...formData, date: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                                                <input
                                                    type="date"
                                                    value={formData.endDate}
                                                    onChange={(e) => setFormData({...formData, endDate: e.target.value})}
                                                    className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                />
                                            </div>
                                        </div>

                                        <div className="mb-4">
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Attendees (comma separated)</label>
                                            <textarea
                                                value={formData.attendees}
                                                onChange={(e) => setFormData({...formData, attendees: e.target.value})}
                                                className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600 resize-none"
                                                rows="3"
                                                placeholder="John Doe, Jane Smith, etc."
                                            />
                                        </div>

                                        <div className="mb-6">
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Notes</label>
                                            <textarea
                                                value={formData.notes}
                                                onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                                className="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600 resize-none"
                                                rows="3"
                                                placeholder="Meeting notes..."
                                            />
                                        </div>

                                        <div className="flex space-x-3">
                                            <button
                                                onClick={() => setShowMeetingForm(false)}
                                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-all"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                onClick={handleAddMeeting}
                                                className="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-all"
                                            >
                                                Create Meeting
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingMinutesApp />);
    </script>
</body>
</html>
