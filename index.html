const loadStoredValue = (key, fallback) => {
  try {
    const rawValue = window.localStorage.getItem(key);
    if (!rawValue) {
      return fallback;
    }

    const parsedValue = JSON.parse(rawValue);
    return parsedValue ?? fallback;
  } catch (error) {
    console.warn(`Unable to read ${key} from localStorage.`, error);
    return fallback;
  }
};

const saveStoredValue = (key, value) => {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch (error) {
    console.warn(`Unable to save ${key} to localStorage.`, error);
  }
};

const getNextId = (items) => items.reduce((maxId, item) => Math.max(maxId, Number(item.id) || 0), 0) + 1;

const escapeCsvCell = (value) => {
  const text = `${value ?? ''}`;
  const escapedText = text.replace(/"/g, '""');
  return /[",\n]/.test(text) ? `"${escapedText}"` : escapedText;
};

const buildCsv = (rows) => rows.map((row) => row.map(escapeCsvCell).join(',')).join('\n');

const downloadFile = (filename, content, mimeType) => {
  const blob = new Blob([content], { type: mimeType });
  const url = window.URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = filename;
  anchor.click();
  window.setTimeout(() => window.URL.revokeObjectURL(url), 0);
};

const normalizeText = (value) => `${value ?? ''}`.trim().toLowerCase();

const normalizeHeader = (value) => normalizeText(value).replace(/[^a-z0-9]+/g, ' ').trim();

const normalizeOptionalText = (value) => `${value ?? ''}`.trim();

const parseOptionalAmount = (value) => {
  const normalizedValue = `${value ?? ''}`.trim().replace(/,/g, '');
  if (!normalizedValue) {
    return '';
  }

  const parsedValue = Number(normalizedValue);
  return Number.isFinite(parsedValue) ? parsedValue : null;
};

const normalizeExpenseRecord = (expense) => {
  const paymentCollected = parseOptionalAmount(expense.paymentCollected);
  const legacyGuestDetails = normalizeOptionalText(expense.guestDetails);

  return {
    ...expense,
    id: Number.isFinite(Number(expense.id)) ? Number(expense.id) : expense.id,
    guestHouseId: Number.parseInt(expense.guestHouseId, 10),
    plant: normalizeOptionalText(expense.plant),
    category: normalizeOptionalText(expense.category),
    amount: Number.isFinite(Number(expense.amount)) ? Number(expense.amount) : 0,
    date: normalizeOptionalText(expense.date),
    description: normalizeOptionalText(expense.description),
    guestDetails: legacyGuestDetails,
    guestName: normalizeOptionalText(expense.guestName || legacyGuestDetails),
    guestDesignation: normalizeOptionalText(expense.guestDesignation),
    guestDepartment: normalizeOptionalText(expense.guestDepartment),
    checkInDate: normalizeOptionalText(expense.checkInDate),
    checkInTime: normalizeOptionalText(expense.checkInTime),
    checkOutDate: normalizeOptionalText(expense.checkOutDate),
    checkOutTime: normalizeOptionalText(expense.checkOutTime),
    visitedFrom: normalizeOptionalText(expense.visitedFrom),
    caretakerName: normalizeOptionalText(expense.caretakerName),
    paymentCollected: paymentCollected === null ? '' : paymentCollected,
    userId: Number.isFinite(Number(expense.userId)) ? Number(expense.userId) : expense.userId,
  };
};

const formatDateTimeDisplay = (date, time) => {
  const parts = [normalizeOptionalText(date), normalizeOptionalText(time)].filter(Boolean);
  return parts.length > 0 ? parts.join(' ') : 'Not provided';
};

const formatCurrencyDisplay = (value) => {
  if (value === '' || value === null || value === undefined) {
    return '-';
  }

  const amount = Number(value);
  return Number.isFinite(amount) ? `₹${amount.toLocaleString('en-IN')}` : '-';
};

const getInitialThemeMode = () => {
  const savedThemeMode = loadStoredValue(STORAGE_KEYS.themeMode, null);
  if (savedThemeMode === 'light' || savedThemeMode === 'dark-blue') {
    return savedThemeMode;
  }

  const legacyDarkMode = loadStoredValue(STORAGE_KEYS.darkMode, false);
  return legacyDarkMode ? 'dark-blue' : 'light';
};

const parseCsv = (text) => {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let index = 0; index < text.length; index += 1) {
    const character = text[index];

    if (inQuotes) {
      if (character === '"') {
        if (text[index + 1] === '"') {
          cell += '"';
          index += 1;
        } else {
          inQuotes = false;
        }
      } else {
        cell += character;
      }
      continue;
    }

    if (character === '"') {
      inQuotes = true;
      continue;
    }

    if (character === ',') {
      row.push(cell);
      cell = '';
      continue;
    }

    if (character === '\n') {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = '';
      continue;
    }

    if (character !== '\r') {
      cell += character;
    }
  }

  row.push(cell);
  if (row.some((value) => `${value}`.length > 0) || rows.length === 0) {
    rows.push(row);
  }

  return rows;
};

  const [filterPlant, setFilterPlant] = useState('All');
  const [filterGuestHouse, setFilterGuestHouse] = useState('All');
  const [filterCategory, setFilterCategory] = useState('All');
  const [filterDateFrom, setFilterDateFrom] = useState('');
  const [filterDateTo, setFilterDateTo] = useState('');
  const darkMode = themeMode === 'dark-blue';

  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    document.body.classList.toggle('dark', darkMode);
    document.body.classList.toggle('theme-dark-blue', darkMode);
    document.body.style.colorScheme = darkMode ? 'dark' : 'light';
  }, [darkMode]);

  useEffect(() => {
    saveStoredValue(STORAGE_KEYS.themeMode, themeMode);
    saveStoredValue(STORAGE_KEYS.darkMode, darkMode);
  }, [themeMode, darkMode]);

  useEffect(() => {
    saveStoredValue(STORAGE_KEYS.users, users);
  }, [users]);

  useEffect(() => {
    saveStoredValue(STORAGE_KEYS.plants, plants);
  }, [plants]);

  useEffect(() => {
    saveStoredValue(STORAGE_KEYS.guestHouses, guestHouses);
  }, [guestHouses]);

  useEffect(() => {
    saveStoredValue(STORAGE_KEYS.expenses, expenses);
  }, [expenses]);

  // Authentication
  const handleLogin = (username, password) => {
    const user = users.find(u => u.username === username && u.password === password);
    if (user) {
      setCurrentUser(user);
      setActiveTab('dashboard');
      return true;
    }
    return false;
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setActiveTab('dashboard');
    setFilterPlant('All');
    setFilterGuestHouse('All');
  };

  const openModal = (type, data = {}, item = null) => {
    setModalType(type);
    setSelectedItem(item);
    setFormData(data);
    setShowModal(true);
  };

  const closeModal = () => {
    setShowModal(false);
    setModalType('');
    setSelectedItem(null);
    setFormData({});
  };

  const ensurePlantExists = (plantName) => {
    const normalizedPlant = `${plantName ?? ''}`.trim();
    if (!normalizedPlant) {
      return '';
    }

    setPlants((currentPlants) => (
      currentPlants.includes(normalizedPlant) ? currentPlants : [...currentPlants, normalizedPlant]
    ));

    return normalizedPlant;
  };

  // Filter data based on user role
  const getAccessibleData = () => {
    if (!currentUser) return { guestHouses: [], expenses: [] };

    if (currentUser.role === 'User') {
      const userGuestHouses = guestHouses.filter(gh => gh.plant === currentUser.plant);
      const userExpenses = expenses.filter(e => e.plant === currentUser.plant);
      return { guestHouses: userGuestHouses, expenses: userExpenses };
    }

    return { guestHouses, expenses };
  };

  const buildExpensePayload = (data, existingExpense = {}) => {
    const guestHouse = guestHouses.find((gh) => gh.id === parseInt(data.guestHouseId, 10));
    if (!guestHouse) {
      window.alert('Please select a valid guest house.');
      return null;
    }

    const amount = Number(data.amount);
    if (!Number.isFinite(amount) || amount <= 0) {
      window.alert('Please enter a valid expense amount.');
      return null;
    }

    const paymentCollected = parseOptionalAmount(data.paymentCollected);
    if (paymentCollected === null || paymentCollected < 0) {
      window.alert('Please enter a valid amount for payment collected from guest.');
      return null;
    }

    return normalizeExpenseRecord({
      ...existingExpense,
      ...data,
      plant: guestHouse.plant,
      userId: existingExpense.userId ?? currentUser.id,
      amount,
      paymentCollected,
    });
  };

  // CRUD Operations
  const handleAddExpense = (data) => {
    const expensePayload = buildExpensePayload(data);
    if (!expensePayload) {
      return;
    }

    setExpenses((currentExpenses) => [
      ...currentExpenses,
      { ...expensePayload, id: getNextId(currentExpenses), userId: currentUser.id },
    ]);
    closeModal();
  };

  const handleEditExpense = (data) => {
    const expensePayload = buildExpensePayload(data, selectedItem);
    if (!expensePayload) {
      return;
    }

    setExpenses((currentExpenses) => currentExpenses.map((expense) =>
      expense.id === selectedItem.id ? expensePayload : expense
    ));
    closeModal();
  };

  const handleDeleteExpense = (id) => {
    setExpenses(expenses.filter(e => e.id !== id));
  };

  const handleAddUser = (data) => {
    const newUser = {
      id: getNextId(users),
      ...data,
    };
    setUsers((currentUsers) => [...currentUsers, newUser]);
    closeModal();
  };

  const handleEditUser = (data) => {
    setUsers(users.map(u => u.id === selectedItem.id ? { ...u, ...data } : u));
    closeModal();
  };

  const handleDeleteUser = (id) => {
    setUsers(users.filter(u => u.id !== id));
  };

  const handleAddGuestHouse = (data) => {
    const name = `${data.name ?? ''}`.trim();
    const plant = `${data.plant ?? ''}`.trim();

    if (!name || !plant) {
      window.alert('Please provide both a guest house name and a plant.');
      return;
    }

    const alreadyExists = guestHouses.some((guestHouse) => (
      normalizeText(guestHouse.name) === normalizeText(name) &&
      normalizeText(guestHouse.plant) === normalizeText(plant)
    ));

    if (alreadyExists) {
      window.alert('A guest house with the same name already exists for this plant.');
      return;
    }

    ensurePlantExists(plant);
    setGuestHouses((currentGuestHouses) => [
      ...currentGuestHouses,
      { id: getNextId(currentGuestHouses), name, plant },
    ]);
    closeModal();
  };

  const handleDeleteGuestHouse = (id) => {
    const hasExpenses = expenses.some(e => e.guestHouseId === id);
    if (hasExpenses) {
      window.alert('Cannot delete this guest house because it has associated expense records. Please delete those expenses first.');
      return;
    }
    if (window.confirm('Are you sure you want to delete this guest house? This action cannot be undone.')) {
      setGuestHouses(guestHouses.filter(gh => gh.id !== id));
    }
  };

  const handleEditGuestHouse = (data) => {
    const name = `${data.name ?? ''}`.trim();
    const plant = `${data.plant ?? ''}`.trim();

    if (!name || !plant) {
      window.alert('Please provide both a guest house name and a plant.');
      return;
    }

    const alreadyExists = guestHouses.some((guestHouse) => (
      guestHouse.id !== selectedItem.id &&
      normalizeText(guestHouse.name) === normalizeText(name) &&
      normalizeText(guestHouse.plant) === normalizeText(plant)
    ));

    if (alreadyExists) {
      window.alert('A guest house with the same name already exists for this plant.');
      return;
    }

    ensurePlantExists(plant);
    setGuestHouses(guestHouses.map(gh =>
      gh.id === selectedItem.id ? { ...gh, name, plant } : gh
    ));
    setExpenses(expenses.map((expense) => (
      expense.guestHouseId === selectedItem.id ? { ...expense, plant } : expense
    )));
    closeModal();
  };

  const handleBulkUploadExpenses = async (data) => {
    if (!data.file) {
      window.alert('Choose a CSV file before importing.');
      return;
    }

    let csvText = '';

    try {
      csvText = await data.file.text();
    } catch (error) {
      window.alert('The selected CSV file could not be read.');
      return;
    }

    const rows = parseCsv(csvText).filter((row) => row.some((cell) => `${cell ?? ''}`.trim() !== ''));
    if (rows.length < 2) {
      window.alert('The CSV file is empty or only contains headers.');
      return;
    }

    const headers = rows[0].map(normalizeHeader);
    const columnIndex = {
      date: headers.findIndex((header) => header === 'date'),
      plant: headers.findIndex((header) => header === 'plant'),
      guestHouse: headers.findIndex((header) => ['guest house', 'guesthouse', 'guest house name'].includes(header)),
      category: headers.findIndex((header) => header === 'category'),
      amount: headers.findIndex((header) => header === 'amount'),
      description: headers.findIndex((header) => ['description', 'remark', 'remarks', 'note', 'notes'].includes(header)),
      guestName: headers.findIndex((header) => ['guest name', 'guest', 'guest details', 'guest detail'].includes(header)),
      guestDesignation: headers.findIndex((header) => ['designation', 'guest designation'].includes(header)),
      guestDepartment: headers.findIndex((header) => ['department', 'guest department'].includes(header)),
      checkInDate: headers.findIndex((header) => ['check in date', 'checkin date'].includes(header)),
      checkInTime: headers.findIndex((header) => ['check in time', 'checkin time'].includes(header)),
      checkOutDate: headers.findIndex((header) => ['check out date', 'checkout date'].includes(header)),
      checkOutTime: headers.findIndex((header) => ['check out time', 'checkout time'].includes(header)),
      visitedFrom: headers.findIndex((header) => ['visited from location', 'visited from', 'from location'].includes(header)),
      caretakerName: headers.findIndex((header) => ['caretaker name', 'caretaker'].includes(header)),
      paymentCollected: headers.findIndex((header) => ['payment collected from guest', 'payment collected', 'guest payment', 'payment received from guest'].includes(header)),
    };

    const missingColumns = [
      ['Date', columnIndex.date],
      ['Guest House', columnIndex.guestHouse],
      ['Category', columnIndex.category],
      ['Amount', columnIndex.amount],
    ]
      .filter(([, index]) => index === -1)
      .map(([label]) => label);

    if (missingColumns.length > 0) {
      window.alert(`Missing required column(s): ${missingColumns.join(', ')}.`);
      return;
    }

    const allowedGuestHouses = currentUser.role === 'User'
      ? guestHouses.filter((guestHouse) => guestHouse.plant === currentUser.plant)
      : guestHouses;

    let nextExpenseId = getNextId(expenses);
    const importedExpenses = [];
    const skippedRows = [];

    rows.slice(1).forEach((row, index) => {
      const lineNumber = index + 2;
      const getValue = (column) => column >= 0 ? `${row[column] ?? ''}`.trim() : '';

      const date = getValue(columnIndex.date);
      const plant = getValue(columnIndex.plant);
      const guestHouseName = getValue(columnIndex.guestHouse);
      const categoryInput = getValue(columnIndex.category);
      const amountInput = getValue(columnIndex.amount).replace(/,/g, '');
      const description = getValue(columnIndex.description);
      const guestName = getValue(columnIndex.guestName);
      const guestDesignation = getValue(columnIndex.guestDesignation);
      const guestDepartment = getValue(columnIndex.guestDepartment);
      const checkInDate = getValue(columnIndex.checkInDate);
      const checkInTime = getValue(columnIndex.checkInTime);
      const checkOutDate = getValue(columnIndex.checkOutDate);
      const checkOutTime = getValue(columnIndex.checkOutTime);
      const visitedFrom = getValue(columnIndex.visitedFrom);
      const caretakerName = getValue(columnIndex.caretakerName);
      const paymentCollectedInput = getValue(columnIndex.paymentCollected);

      if (!date || !guestHouseName || !categoryInput || !amountInput) {
        skippedRows.push(`Line ${lineNumber}: one or more required values are missing.`);
        return;
      }

      if (!/^\d{2}-\d{2}-\d{4}$/.test(date)) {
        skippedRows.push(`Line ${lineNumber}: date must be in DD-MM-YYYY format.`);
        return;
      }
      const [dd, mm, yyyy] = date.split('-');
      const dateISO = `${yyyy}-${mm}-${dd}`;

      const category = categories.find((item) => normalizeText(item) === normalizeText(categoryInput));
      if (!category) {
        skippedRows.push(`Line ${lineNumber}: category "${categoryInput}" is not supported.`);
        return;
      }

      const amount = Number(amountInput);
      if (!Number.isFinite(amount) || amount <= 0) {
        skippedRows.push(`Line ${lineNumber}: amount "${amountInput}" is invalid.`);
        return;
      }

      if (checkInDate && !/^\d{2}-\d{2}-\d{4}$/.test(checkInDate)) {
        skippedRows.push(`Line ${lineNumber}: check-in date must be in DD-MM-YYYY format.`);
        return;
      }
      const checkInDateISO = checkInDate ? (() => { const [d,m,y]=checkInDate.split('-'); return `${y}-${m}-${d}`; })() : '';

      if (checkOutDate && !/^\d{2}-\d{2}-\d{4}$/.test(checkOutDate)) {
        skippedRows.push(`Line ${lineNumber}: check-out date must be in DD-MM-YYYY format.`);
        return;
      }
      const checkOutDateISO = checkOutDate ? (() => { const [d,m,y]=checkOutDate.split('-'); return `${y}-${m}-${d}`; })() : '';

      if (checkInTime && !/^\d{2}:\d{2}(:\d{2})?$/.test(checkInTime)) {
        skippedRows.push(`Line ${lineNumber}: check-in time must be in HH:MM format.`);
        return;
      }

      if (checkOutTime && !/^\d{2}:\d{2}(:\d{2})?$/.test(checkOutTime)) {
        skippedRows.push(`Line ${lineNumber}: check-out time must be in HH:MM format.`);
        return;
      }

      const paymentCollected = parseOptionalAmount(paymentCollectedInput);
      if (paymentCollected === null || paymentCollected < 0) {
        skippedRows.push(`Line ${lineNumber}: payment collected "${paymentCollectedInput}" is invalid.`);
        return;
      }

      const matchingGuestHouses = allowedGuestHouses.filter((guestHouse) => {
        const sameName = normalizeText(guestHouse.name) === normalizeText(guestHouseName);
        const samePlant = !plant || normalizeText(guestHouse.plant) === normalizeText(plant);
        return sameName && samePlant;
      });

      if (matchingGuestHouses.length === 0) {
        skippedRows.push(`Line ${lineNumber}: guest house "${guestHouseName}" was not found or is not accessible for this user.`);
        return;
      }

      if (matchingGuestHouses.length > 1) {
        skippedRows.push(`Line ${lineNumber}: guest house "${guestHouseName}" matches multiple plants. Include the Plant column to disambiguate it.`);
        return;
      }

      const guestHouse = matchingGuestHouses[0];
      importedExpenses.push(normalizeExpenseRecord({
        id: nextExpenseId,
        guestHouseId: guestHouse.id,
        plant: guestHouse.plant,
        category,
        amount,
        date: dateISO,
        description,
        guestName,
        guestDesignation,
        guestDepartment,
        checkInDate: checkInDateISO,
        checkInTime,
        checkOutDate: checkOutDateISO,
        checkOutTime,
        visitedFrom,
        caretakerName,
        paymentCollected,
        userId: currentUser.id,
      }));
      nextExpenseId += 1;
    });

    if (importedExpenses.length === 0) {
      const preview = skippedRows.slice(0, 5).join('\n');
      window.alert(`No expenses were imported.\n${preview}`);
      return;
    }

    setExpenses((currentExpenses) => [...currentExpenses, ...importedExpenses]);
    closeModal();

    const skippedSummary = skippedRows.length > 0
      ? ` ${skippedRows.length} row(s) were skipped.\n${skippedRows.slice(0, 5).join('\n')}${skippedRows.length > 5 ? `\n...and ${skippedRows.length - 5} more issue(s).` : ''}`
      : '';

    window.alert(`Imported ${importedExpenses.length} expense(s).${skippedSummary}`);
  };

  // Export data
  const handleExport = () => {
    const { expenses: filteredExpenses } = getAccessibleData();
    const filtered = applyFilters(filteredExpenses);
    
    const csv = buildCsv([
      ['Date', 'Plant', 'Guest House', 'Guest Name', 'Designation', 'Department', 'Check-In Date', 'Check-In Time', 'Check-Out Date', 'Check-Out Time', 'Visited From Location', 'Caretaker Name', 'Category', 'Amount', 'Payment Collected From Guest', 'Description'],
      ...filtered.map(e => {
        const gh = guestHouses.find(g => g.id === e.guestHouseId);
        return [e.date, e.plant, gh?.name || '', e.guestName, e.guestDesignation, e.guestDepartment, e.checkInDate, e.checkInTime, e.checkOutDate, e.checkOutTime, e.visitedFrom, e.caretakerName, e.category, e.amount, e.paymentCollected, e.description];
      })
    ]);

    downloadFile(
      `expenses_${new Date().toISOString().split('T')[0]}.csv`,
      csv,
      'text/csv;charset=utf-8;'
    );
  };

  // Apply filters
  const applyFilters = (expenseList) => {
    return expenseList.filter(e => {
      const matchPlant = filterPlant === 'All' || e.plant === filterPlant;
      const matchGH = filterGuestHouse === 'All' || e.guestHouseId === parseInt(filterGuestHouse);
      const matchCategory = filterCategory === 'All' || e.category === filterCategory;
      const matchDateFrom = !filterDateFrom || e.date >= filterDateFrom;
      const matchDateTo = !filterDateTo || e.date <= filterDateTo;
      return matchPlant && matchGH && matchCategory && matchDateFrom && matchDateTo;
    });
  };

  // Calculate statistics
  const calculateStats = (expenseList) => {
    const filtered = applyFilters(expenseList);
    
    const total = filtered.reduce((sum, e) => sum + e.amount, 0);
    
    const byCategory = categories.map(cat => ({
      category: cat,
      amount: filtered.filter(e => e.category === cat).reduce((sum, e) => sum + e.amount, 0)
    }));

    const byPlant = [...new Set(filtered.map(e => e.plant))].map(plant => ({
      plant,
      amount: filtered.filter(e => e.plant === plant).reduce((sum, e) => sum + e.amount, 0)
    }));

    const byGuestHouse = guestHouses
      .filter(gh => filtered.some(e => e.guestHouseId === gh.id) && gh.name && gh.name.trim() !== '')
      .map(gh => ({
        name: gh.name,
        amount: filtered.filter(e => e.guestHouseId === gh.id).reduce((sum, e) => sum + e.amount, 0)
      }));

    return { total, byCategory, byPlant, byGuestHouse, count: filtered.length };
  };

  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} darkMode={darkMode} setThemeMode={setThemeMode} />;
  }

  const { guestHouses: accessibleGuestHousesRaw, expenses: accessibleExpenses } = getAccessibleData();
  const accessibleGuestHouses = accessibleGuestHousesRaw.filter(gh => gh.name && gh.name.trim() !== '');
  const stats = calculateStats(accessibleExpenses);

  return (
    <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'dark theme-dark-blue' : ''}`}>
      <div className={`min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100 dark:from-slate-950 dark:via-blue-950 dark:to-blue-900 ${darkMode ? 'theme-dark-blue' : ''}`}>
        {/* Header */}
        <header className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm">
          <div className="max-w-7xl mx-auto px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <PolyplasticsLogo />
                <div className="h-8 w-px bg-slate-300 dark:bg-slate-700" />
                <div>
                  <h1 className="text-lg font-bold text-slate-900 dark:text-slate-100 tracking-tight">
                    Guest House Management
                  </h1>
                  <p className="text-xs text-slate-600 dark:text-slate-400">Creating Identities</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right">
                  <p className="text-sm font-semibold text-slate-900 dark:text-slate-100">{currentUser.name}</p>
                  <p className="text-xs text-slate-600 dark:text-slate-400">{currentUser.role} | {currentUser.plant}</p>
                </div>
                <ThemeSwitch darkMode={darkMode} setThemeMode={setThemeMode} />
                <button
                  onClick={handleLogout}
                  className="flex items-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors font-medium"
                >
                  <LogOut className="w-4 h-4" />
                  Logout
                </button>
              </div>
            </div>
          </div>
        </header>

        {/* Navigation */}
        <nav className="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
          <div className="max-w-7xl mx-auto px-6">
            <div className="flex gap-1">
              <NavButton
                active={activeTab === 'dashboard'}
                onClick={() => setActiveTab('dashboard')}
                icon={<BarChart3 className="w-4 h-4" />}
                label="Dashboard"
              />
              <NavButton
                active={activeTab === 'expenses'}
                onClick={() => setActiveTab('expenses')}
                icon={<DollarSign className="w-4 h-4" />}
                label="Expenses"
              />
              <NavButton
                active={activeTab === 'reports'}
                onClick={() => setActiveTab('reports')}
                icon={<BarChart3 className="w-4 h-4" />}
                label="Expense Report"
              />
              {['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
                <>
                  <NavButton
                    active={activeTab === 'users'}
                    onClick={() => setActiveTab('users')}
                    icon={<Users className="w-4 h-4" />}
                    label="Users"
                  />
                  <NavButton
                    active={activeTab === 'guesthouses'}
                    onClick={() => setActiveTab('guesthouses')}
                    icon={<Home className="w-4 h-4" />}
                    label="Guest Houses"
                  />
                </>
              )}
            </div>
          </div>
        </nav>

        {/* Main Content */}
        <main className="max-w-7xl mx-auto px-6 py-8">
          {activeTab === 'dashboard' && (
            <DashboardView
              currentUser={currentUser}
              stats={stats}
              expenses={accessibleExpenses}
              guestHouses={accessibleGuestHouses}
              darkMode={darkMode}
              filterPlant={filterPlant}
              setFilterPlant={setFilterPlant}
              filterGuestHouse={filterGuestHouse}
              setFilterGuestHouse={setFilterGuestHouse}
              filterCategory={filterCategory}
              setFilterCategory={setFilterCategory}
              filterDateFrom={filterDateFrom}
              setFilterDateFrom={setFilterDateFrom}
              filterDateTo={filterDateTo}
              setFilterDateTo={setFilterDateTo}
              plants={plants}
              applyFilters={applyFilters}
              handleExport={handleExport}
            />
          )}

          {activeTab === 'expenses' && (
            <ExpensesView
              expenses={accessibleExpenses}
              guestHouses={accessibleGuestHouses}
              currentUser={currentUser}
              onAdd={() => openModal('addExpense')}
              onBulkUpload={() => openModal('bulkUploadExpenses')}
              onEdit={(expense) => openModal('editExpense', expense, expense)}
              onDelete={handleDeleteExpense}
              filterPlant={filterPlant}
              setFilterPlant={setFilterPlant}
              filterGuestHouse={filterGuestHouse}
              setFilterGuestHouse={setFilterGuestHouse}
              filterCategory={filterCategory}
              setFilterCategory={setFilterCategory}
              plants={plants}
              applyFilters={applyFilters}
            />
          )}

          {activeTab === 'reports' && (
            <ExpenseReportView
              expenses={accessibleExpenses}
              plants={plants}
              currentUser={currentUser}
              darkMode={darkMode}
            />
          )}

          {activeTab === 'users' && ['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
            <UsersView
              users={users}
              plants={plants}
              onAdd={() => openModal('addUser')}
              onEdit={(user) => openModal('editUser', user, user)}
              onDelete={handleDeleteUser}
            />
          )}

          {activeTab === 'guesthouses' && ['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
            <GuestHousesView
              guestHouses={guestHouses}
              currentUser={currentUser}
              onAdd={() => openModal('addGuestHouse')}
              onEdit={(gh) => openModal('editGuestHouse', { name: gh.name, plant: gh.plant }, gh)}
              onDelete={handleDeleteGuestHouse}
            />
          )}
        </main>

        {/* Modal */}
        {showModal && (
          <Modal
            type={modalType}
            data={formData}
            guestHouses={accessibleGuestHouses}
            plants={plants}
            onClose={closeModal}
            onSubmit={(data) => {
              if (modalType === 'addExpense') handleAddExpense(data);
              if (modalType === 'editExpense') handleEditExpense(data);
              if (modalType === 'bulkUploadExpenses') handleBulkUploadExpenses(data);
              if (modalType === 'addUser') handleAddUser(data);
              if (modalType === 'editUser') handleEditUser(data);
              if (modalType === 'addGuestHouse') handleAddGuestHouse(data);
              if (modalType === 'editGuestHouse') handleEditGuestHouse(data);
            }}
          />
        )}
      </div>
    </div>
  );
};

// Login Screen
const LoginScreen = ({ onLogin, darkMode, setThemeMode }) => {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [showPassword, setShowPassword] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (onLogin(username, password)) {
      setError('');
    } else {
      setError('Invalid credentials');
    }
  };

  return (

const BulkUploadExpensesForm = ({ formData, handleChange }) => {
  const [dragOver, setDragOver] = React.useState(false);
  const [preview, setPreview] = React.useState(null); // {rows, fileName}

  const TEMPLATE_HEADERS = [
    'Date','Plant','Guest House','Category','Amount',
    'Description','Guest Name','Designation','Department',
    'Check-In Date','Check-In Time','Check-Out Date','Check-Out Time',
    'Visited From Location','Caretaker Name','Payment Collected From Guest'
  ];
  const REQUIRED = ['Date','Guest House','Category','Amount'];
  const SAMPLE_ROW = [
    '15-04-2026','Plant A','Executive House A','Food','3500',
    'Dinner for visiting delegation','Rajesh Kumar','GM – Operations','Supply Chain',
    '14-04-2026','19:00','15-04-2026','11:00','Mumbai','Suresh','500'
  ];

  const downloadTemplate = () => {
    const esc = (v) => { const s=`${v??''}`; return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; };
    const csv = [TEMPLATE_HEADERS, SAMPLE_ROW].map(r=>r.map(esc).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='bulk_upload_template.csv'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),0);
  };

  const processFile = (file) => {
    if (!file) return;
    handleChange('file', file);
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      const parseRow = (line) => {
        const cells=[]; let cell='', inQ=false;
        for(let i=0;i<line.length;i++){
          const c=line[i];
          if(inQ){if(c==='"'&&line[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQ=false;}else{cell+=c;}}
          else if(c==='"'){inQ=true;}
          else if(c===','){cells.push(cell);cell='';}
          else{cell+=c;}
        }
        cells.push(cell);
        return cells;
      };
      const rows = lines.map(parseRow);
      setPreview({ rows: rows.slice(0, 6), total: lines.length - 1, fileName: file.name });
    };
    reader.readAsText(file);
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    if (file && (file.name.endsWith('.csv') || file.type === 'text/csv')) processFile(file);
  };

  return (
    <div className="space-y-4">
      {/* Column reference */}
      <div className="rounded-xl border border-blue-100 bg-blue-50/80 dark:border-blue-900/50 dark:bg-blue-950/30 overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b border-blue-100 dark:border-blue-900/50">
          <p className="text-sm font-semibold text-blue-900 dark:text-blue-200">CSV Column Reference</p>
          <button
            type="button"
            onClick={downloadTemplate}
            className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors"
          >
            <Download className="w-3 h-3" />
            Download Template
          </button>
        </div>
        <div className="px-4 py-3 grid grid-cols-2 gap-x-6 gap-y-1 text-xs">
          <div>
            <p className="font-semibold text-blue-800 dark:text-blue-300 mb-1.5">Required ✦</p>
            {['Date (DD-MM-YYYY)','Guest House','Category','Amount'].map(c=>(
              <p key={c} className="text-blue-700 dark:text-blue-400 leading-5">• {c}</p>
            ))}
          </div>
          <div>
            <p className="font-semibold text-blue-800 dark:text-blue-300 mb-1.5">Optional</p>
            {['Plant','Description','Guest Name','Designation','Department',
              'Check-In Date','Check-In Time','Check-Out Date','Check-Out Time',
              'Visited From Location','Caretaker Name','Payment Collected From Guest'
            ].map(c=>(
              <p key={c} className="text-blue-700 dark:text-blue-400 leading-5">• {c}</p>
            ))}
          </div>
        </div>
      </div>

      {/* Drop zone */}
      <div
        onDragOver={(e)=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={handleDrop}
        className={`relative rounded-xl border-2 border-dashed transition-colors cursor-pointer
          ${dragOver
            ? 'border-blue-500 bg-blue-50 dark:bg-blue-950/30'
            : 'border-slate-300 dark:border-slate-600 hover:border-blue-400 dark:hover:border-cyan-500 bg-slate-50 dark:bg-slate-800/50'
          }`}
      >
        <label className="flex flex-col items-center gap-2 py-6 cursor-pointer w-full">
          <Upload className={`w-8 h-8 ${dragOver ? 'text-blue-500' : 'text-slate-400'}`} />
          {preview ? (
            <div className="text-center">
              <p className="text-sm font-semibold text-slate-700 dark:text-slate-200">📄 {preview.fileName}</p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{preview.total} data row{preview.total !== 1 ? 's' : ''} detected</p>
            </div>
          ) : (
            <div className="text-center">
              <p className="text-sm font-semibold text-slate-700 dark:text-slate-200">
                {dragOver ? 'Drop your CSV here' : 'Drag & drop your CSV, or click to browse'}
              </p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Accepts .csv files</p>
            </div>
          )}
          <input
            type="file"
            accept=".csv,text/csv"
            className="absolute inset-0 opacity-0 cursor-pointer"
            onChange={(e) => processFile(e.target.files?.[0] || null)}
          />
        </label>
      </div>

      {/* Preview table */}
      {preview && preview.rows.length > 1 && (
        <div className="rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div className="px-4 py-2 bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
            <p className="text-xs font-semibold text-slate-600 dark:text-slate-300">Preview (first {Math.min(preview.rows.length - 1, 5)} rows)</p>
          </div>
          <div className="overflow-x-auto">
            <table className="text-xs w-full">
              <thead>
                <tr className="bg-slate-100 dark:bg-slate-700/60">
                  {preview.rows[0].map((h, i) => (
                    <th key={i} className="px-3 py-2 text-left font-semibold text-slate-600 dark:text-slate-300 whitespace-nowrap">{h || `Col ${i+1}`}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {preview.rows.slice(1, 6).map((row, ri) => (
                  <tr key={ri} className="border-t border-slate-100 dark:border-slate-700">
                    {row.map((cell, ci) => (
                      <td key={ci} className="px-3 py-1.5 text-slate-700 dark:text-slate-300 whitespace-nowrap max-w-[120px] overflow-hidden text-ellipsis">{cell}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {preview.total > 5 && (
            <p className="px-4 py-2 text-xs text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700">
              + {preview.total - 5} more row{preview.total - 5 !== 1 ? 's' : ''} not shown
            </p>
          )}
        </div>
      )}
    </div>
  );
};

// Pie Chart
const PieChartComponent = ({ data, darkMode }) => {
  const total = data.reduce((sum, item) => sum + item.amount, 0);
  const colors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];

  if (total === 0) {
    return (
      <div className="flex min-h-[20rem] items-center justify-center rounded-xl border border-dashed border-slate-300 bg-slate-50/80 px-6 text-center text-sm font-medium text-slate-500 dark:border-slate-700 dark:bg-slate-900/40 dark:text-slate-400">
        No expense data for the selected filters.
      </div>
    );
  }

  let currentAngle = 0;

  return (
    <div className="flex items-center justify-center">
      <div className="relative w-64 h-64">
        <svg viewBox="0 0 200 200" className="transform -rotate-90">
          {data.map((item, index) => {
            const percentage = (item.amount / total) * 100;
            const angle = (percentage / 100) * 360;
            const startAngle = currentAngle;
            currentAngle += angle;

            const x1 = 100 + 80 * Math.cos((startAngle * Math.PI) / 180);
            const y1 = 100 + 80 * Math.sin((startAngle * Math.PI) / 180);
            const x2 = 100 + 80 * Math.cos((currentAngle * Math.PI) / 180);
            const y2 = 100 + 80 * Math.sin((currentAngle * Math.PI) / 180);

            const largeArc = angle > 180 ? 1 : 0;

            return (
              <path
                key={index}
                d={`M 100 100 L ${x1} ${y1} A 80 80 0 ${largeArc} 1 ${x2} ${y2} Z`}
                fill={colors[index % colors.length]}
                className="hover:opacity-80 transition-opacity"
              />
            );
          })}
          <circle cx="100" cy="100" r="50" fill="white" className="dark:fill-slate-900" />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <div className="text-center">
            <p className="text-2xl font-bold text-slate-900 dark:text-slate-100">
              ₹{total.toLocaleString('en-IN')}
            </p>
            <p className="text-xs text-slate-600 dark:text-slate-400">Total</p>
          </div>
        </div>
      </div>
      <div className="ml-8 space-y-2">
        {data.map((item, index) => (
          <div key={index} className="flex items-center gap-3">
            <div
              className="w-4 h-4 rounded-full"
              style={{ backgroundColor: colors[index % colors.length] }}
            />
            <div>
              <p className="text-sm font-medium text-slate-900 dark:text-slate-100">{item.category}</p>
              <p className="text-xs text-slate-600 dark:text-slate-400">
                ₹{item.amount.toLocaleString('en-IN')} ({((item.amount / total) * 100).toFixed(1)}%)
              </p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CATEGORIES = ['Food','Maintenance','Utilities','Miscellaneous'];
const CAT_COLORS = {
  Food: { bg: 'bg-blue-500', text: 'text-blue-700', light: 'bg-blue-50 dark:bg-blue-900/20' },
  Maintenance: { bg: 'bg-emerald-500', text: 'text-emerald-700', light: 'bg-emerald-50 dark:bg-emerald-900/20' },

};

const fmtINR = (v) => v ? `₹${Number(v).toLocaleString('en-IN')}` : '₹0';

const ExpenseReportView = ({ expenses, plants, currentUser, darkMode }) => {
  const isAdmin = ['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role);

  // years available in data
  const years = React.useMemo(() => {
    const yrs = new Set(expenses.map(e => e.date ? e.date.slice(0,4) : null).filter(Boolean));
    return Array.from(yrs).sort().reverse();
  }, [expenses]);

  const [selYear, setSelYear] = React.useState(() => years[0] || String(new Date().getFullYear()));
  const [selPlant, setSelPlant] = React.useState('All');
  const [reportTab, setReportTab] = React.useState('monthly'); // 'monthly' | 'category'

  // filtered by year + plant access
  const filtered = React.useMemo(() => {
    return expenses.filter(e => {
      if (!e.date) return false;
      if (e.date.slice(0,4) !== selYear) return false;
      if (isAdmin && selPlant !== 'All' && e.plant !== selPlant) return false;
      return true;
    });
  }, [expenses, selYear, selPlant, isAdmin]);

  // ── MONTHLY REPORT (rows = months, cols = plants or category) ──
  const allPlants = React.useMemo(() => {
    if (!isAdmin) return [currentUser.plant];
    const ps = new Set(filtered.map(e => e.plant).filter(Boolean));
    return Array.from(ps).sort();
  }, [filtered, isAdmin, currentUser]);

  // matrix[monthIdx][plant] = amount
  const monthlyByPlant = React.useMemo(() => {
    const mat = Array.from({length:12}, () => ({}));
    filtered.forEach(e => {
      if (!e.date) return;
      const m = parseInt(e.date.slice(5,7), 10) - 1;
      const p = e.plant || 'Unknown';
      mat[m][p] = (mat[m][p] || 0) + (Number(e.amount) || 0);
    });
    return mat;
  }, [filtered]);

  const monthlyTotals = React.useMemo(() =>
    monthlyByPlant.map(row => Object.values(row).reduce((s,v) => s+v, 0)),
    [monthlyByPlant]
  );

  const plantTotals = React.useMemo(() => {
    const t = {};
    allPlants.forEach(p => {
      t[p] = monthlyByPlant.reduce((s, row) => s + (row[p]||0), 0);
    });
    return t;
  }, [monthlyByPlant, allPlants]);

  const grandTotal = monthlyTotals.reduce((s,v) => s+v, 0);

  // ── CATEGORY REPORT (rows = months, cols = categories) ──
  const monthlyByCat = React.useMemo(() => {
    const mat = Array.from({length:12}, () => ({}));
    filtered.forEach(e => {
      if (!e.date) return;
      const m = parseInt(e.date.slice(5,7), 10) - 1;
      const c = e.category || 'Miscellaneous';
      mat[m][c] = (mat[m][c] || 0) + (Number(e.amount) || 0);
    });
    return mat;
  }, [filtered]);

  const catTotals = React.useMemo(() => {
    const t = {};
    CATEGORIES.forEach(c => {
      t[c] = monthlyByCat.reduce((s, row) => s + (row[c]||0), 0);
    });
    return t;
  }, [monthlyByCat]);

  // bar chart max for monthly
  const maxMonthly = Math.max(...monthlyTotals, 1);
  const maxCat = Math.max(...CATEGORIES.map(c => catTotals[c] || 0), 1);

  const cardCls = `bg-white dark:bg-slate-900 rounded-xl shadow border border-slate-200 dark:border-slate-800`;

  return (
    <div className="space-y-6">
      {/* Header */}
      <div className="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p className="text-xs font-semibold text-blue-600 dark:text-blue-400 uppercase tracking-widest mb-1">// Expense Summary</p>
          <h2 className="text-3xl font-bold text-slate-900 dark:text-slate-100">Expense Report</h2>
          <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">
            {isAdmin ? 'Group-level view — all plants' : `Plant view — ${currentUser.plant}`}
          </p>
        </div>

        {/* Filters */}
        <div className="flex flex-wrap items-center gap-3">
          {/* Year */}
          <select value={selYear} onChange={e => setSelYear(e.target.value)}
            className="px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-blue-500">
            {years.map(y => <option key={y} value={y}>{y}</option>)}
            {!years.includes(String(new Date().getFullYear())) &&
              <option value={String(new Date().getFullYear())}>{new Date().getFullYear()}</option>}
          </select>

          {/* Plant filter — admin only */}
          {isAdmin && (
            <select value={selPlant} onChange={e => setSelPlant(e.target.value)}
              className="px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-blue-500">
              <option value="All">All Plants</option>
              {plants.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* KPI Cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {CATEGORIES.map(cat => {
          const col = CAT_COLORS[cat] || CAT_COLORS.Miscellaneous;
          return (
            <div key={cat} className={`${cardCls} p-5`}>
              <div className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold mb-3 ${col.light} ${col.text}`}>{cat}</div>
              <p className="text-2xl font-bold text-slate-900 dark:text-slate-100">{fmtINR(catTotals[cat])}</p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">YTD {selYear}</p>
            </div>
          );
        })}
      </div>

      {/* Tab selector */}
      <div className="flex gap-2">
        {[['monthly','Month-wise by Plant'],['category','Month-wise by Category']].map(([id,label]) => (
          <button key={id} onClick={() => setReportTab(id)}
            className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${
              reportTab === id
                ? 'bg-blue-600 text-white shadow'
                : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 hover:border-blue-400'
            }`}>{label}</button>
        ))}
      </div>

      {/* ── MONTHLY BY PLANT ── */}
      {reportTab === 'monthly' && (
        <div className={`${cardCls} overflow-hidden`}>
          <div className="p-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <h3 className="font-bold text-slate-900 dark:text-slate-100 text-lg">Month-wise Expenses by Plant — {selYear}</h3>
            <span className="text-xs text-slate-400">₹ values in INR</span>
          </div>

          {/* Bar sparklines */}
          <div className="p-5 grid grid-cols-6 md:grid-cols-12 gap-2">
            {MONTHS.map((m,i) => (
              <div key={m} className="flex flex-col items-center gap-1">
                <div className="w-full flex items-end justify-center" style={{height:'60px'}}>
                  <div className="w-8 rounded-t bg-gradient-to-t from-blue-600 to-cyan-400 transition-all"
                    style={{height: monthlyTotals[i] ? `${Math.max(4,(monthlyTotals[i]/maxMonthly)*60)}px` : '3px', opacity: monthlyTotals[i] ? 1 : 0.2}}/>
                </div>
                <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">{m}</span>
                <span className="text-xs font-bold text-slate-700 dark:text-slate-300 text-center leading-tight">
                  {monthlyTotals[i] ? `₹${(monthlyTotals[i]/1000).toFixed(1)}K` : '—'}
                </span>
              </div>
            ))}
          </div>

          {/* Table — Plants as rows (left), Months as columns (right) */}
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-800">
                  <th className="text-left px-4 py-3 font-semibold text-slate-600 dark:text-slate-400 sticky left-0 bg-slate-50 dark:bg-slate-800 whitespace-nowrap min-w-[140px]">Plant</th>
                  {MONTHS.map(m => (
                    <th key={m} className="text-right px-3 py-3 font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap">{m}</th>
                  ))}
                  <th className="text-right px-4 py-3 font-semibold text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 whitespace-nowrap">Total</th>
                </tr>
              </thead>
              <tbody>
                {allPlants.map(p => {
                  const hasData = plantTotals[p] > 0;
                  return (
                    <tr key={p} className={`border-t border-slate-100 dark:border-slate-800 transition-colors ${hasData ? 'hover:bg-blue-50/50 dark:hover:bg-blue-900/10' : 'opacity-50'}`}>
                      <td className="px-4 py-3 font-semibold text-slate-700 dark:text-slate-300 sticky left-0 bg-white dark:bg-slate-900 whitespace-nowrap">{p}</td>
                      {MONTHS.map((m,i) => (
                        <td key={m} className="px-3 py-3 text-right text-slate-600 dark:text-slate-400 whitespace-nowrap">
                          {monthlyByPlant[i][p] ? fmtINR(monthlyByPlant[i][p]) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                        </td>
                      ))}
                      <td className="px-4 py-3 text-right font-bold text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-800 whitespace-nowrap">
                        {plantTotals[p] ? fmtINR(plantTotals[p]) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-blue-200 dark:border-blue-800 bg-blue-50 dark:bg-blue-900/20">
                  <td className="px-4 py-3 font-bold text-slate-800 dark:text-slate-200 sticky left-0 bg-blue-50 dark:bg-blue-900/20 whitespace-nowrap">Monthly Total</td>
                  {MONTHS.map((m,i) => (
                    <td key={m} className="px-3 py-3 text-right font-bold text-blue-700 dark:text-blue-400 whitespace-nowrap">
                      {monthlyTotals[i] ? fmtINR(monthlyTotals[i]) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                    </td>
                  ))}
                  <td className="px-4 py-3 text-right font-black text-blue-800 dark:text-blue-300 bg-blue-100 dark:bg-blue-900/40 whitespace-nowrap">{fmtINR(grandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ── MONTHLY BY CATEGORY ── */}
      {reportTab === 'category' && (
        <div className={`${cardCls} overflow-hidden`}>
          <div className="p-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <h3 className="font-bold text-slate-900 dark:text-slate-100 text-lg">Month-wise Expenses by Category — {selYear}</h3>
            <span className="text-xs text-slate-400">₹ values in INR</span>
          </div>

          {/* Category bar summary */}
          <div className="p-5 space-y-3">
            {CATEGORIES.map(cat => {
              const col = CAT_COLORS[cat] || CAT_COLORS.Miscellaneous;
              const pct = catTotals[cat] ? (catTotals[cat] / (grandTotal || 1)) * 100 : 0;
              return (
                <div key={cat}>
                  <div className="flex items-center justify-between mb-1">
                    <span className={`text-sm font-semibold ${col.text} dark:opacity-80`}>{cat}</span>
                    <span className="text-sm font-bold text-slate-700 dark:text-slate-300">{fmtINR(catTotals[cat])} <span className="text-slate-400 font-normal">({pct.toFixed(1)}%)</span></span>
                  </div>
                  <div className="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div className={`h-full ${col.bg} rounded-full transition-all duration-700`} style={{width:`${pct}%`}}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Table — Categories as rows (left), Months as columns (right) */}
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-800">
                  <th className="text-left px-4 py-3 font-semibold text-slate-600 dark:text-slate-400 sticky left-0 bg-slate-50 dark:bg-slate-800 whitespace-nowrap min-w-[140px]">Category</th>
                  {MONTHS.map(m => (
                    <th key={m} className="text-right px-3 py-3 font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap">{m}</th>
                  ))}
                  <th className="text-right px-4 py-3 font-semibold text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 whitespace-nowrap">Total</th>
                </tr>
              </thead>
              <tbody>
                {CATEGORIES.map(c => {
                  const col = CAT_COLORS[c] || CAT_COLORS.Miscellaneous;
                  const hasData = catTotals[c] > 0;
                  return (
                    <tr key={c} className={`border-t border-slate-100 dark:border-slate-800 transition-colors ${hasData ? 'hover:bg-slate-50/80 dark:hover:bg-slate-800/40' : 'opacity-50'}`}>
                      <td className={`px-4 py-3 font-semibold sticky left-0 bg-white dark:bg-slate-900 whitespace-nowrap ${col.text} dark:opacity-80`}>{c}</td>
                      {MONTHS.map((m,i) => (
                        <td key={m} className={`px-3 py-3 text-right whitespace-nowrap ${monthlyByCat[i][c] ? col.text+' dark:opacity-70 font-medium' : ''}`}>
                          {monthlyByCat[i][c] ? fmtINR(monthlyByCat[i][c]) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                        </td>
                      ))}
                      <td className={`px-4 py-3 text-right font-bold whitespace-nowrap bg-slate-50 dark:bg-slate-800 ${col.text} dark:opacity-80`}>
                        {catTotals[c] ? fmtINR(catTotals[c]) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800">
                  <td className="px-4 py-3 font-bold text-slate-800 dark:text-slate-200 sticky left-0 bg-slate-100 dark:bg-slate-800 whitespace-nowrap">Monthly Total</td>
                  {MONTHS.map((m,i) => {
                    const monthTotal = CATEGORIES.reduce((s,c) => s + (monthlyByCat[i][c]||0), 0);
                    return (
                      <td key={m} className="px-3 py-3 text-right font-bold text-slate-800 dark:text-slate-200 whitespace-nowrap">
                        {monthTotal ? fmtINR(monthTotal) : <span className="text-slate-300 dark:text-slate-700">—</span>}
                      </td>
                    );
                  })}
                  <td className="px-4 py-3 text-right font-black text-slate-900 dark:text-slate-100 whitespace-nowrap">{fmtINR(grandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {/* Access note for users */}
      {!isAdmin && (
        <div className="flex items-center gap-3 p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl text-sm text-blue-700 dark:text-blue-400">
          <Building2 className="w-5 h-5 flex-shrink-0" />
          <span>You are viewing expense data for <strong>{currentUser.plant}</strong> only. Contact your administrator for group-level reports.</span>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
