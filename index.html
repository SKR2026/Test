<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POLYPLASTICS — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg:        #08090d;
    --surface:   #10121a;
    --card:      #181c28;
    --card2:     #1e2335;
    --border:    #272d42;
    --border2:   #323a55;
    --accent:    #5b8dee;
    --accent2:   #3d6dd4;
    --green:     #34d399;
    --amber:     #fbbf24;
    --red:       #f87171;
    --purple:    #a78bfa;
    --cyan:      #22d3ee;
    --text:      #e8ecf4;
    --text2:     #9aa5c0;
    --text3:     #5c6680;
    --font-head: 'DM Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius:    12px;
    --radius-lg: 18px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }
  /* ─── scrollbar ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── layout ─── */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  #content { padding: 28px; flex: 1; overflow-y: auto; }

  /* ─── sidebar items ─── */
  .logo {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    font-family: var(--font-head); font-weight: 800; font-size: 15px;
    color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
  }
  .logo span { display: block; font-size: 10px; font-weight: 500; color: var(--text3); margin-top: 2px; font-family: var(--font-body); letter-spacing: .8px; text-transform: uppercase; }
  .nav-section { padding: 16px 12px 8px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    margin: 1px 8px; border-radius: 9px; cursor: pointer; color: var(--text2);
    font-size: 13.5px; font-weight: 500; transition: all .15s; position: relative;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(91,141,238,.12); color: var(--accent); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:20%; height:60%; width:3px; background:var(--accent); border-radius:0 3px 3px 0; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }

  /* ─── cards & panels ─── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .panel-title { font-family: var(--font-head); font-weight: 800; font-size: 22px; color: var(--text); margin-bottom: 4px; }
  .panel-sub { color: var(--text3); font-size: 13px; margin-bottom: 24px; }

  /* ─── stats grid ─── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; }
  .stat-card::after { content:''; position:absolute; inset:0; opacity:.04; background: var(--c); pointer-events:none; }
  .stat-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; color: var(--c); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .8px; }
  .stat-icon { position: absolute; right: 14px; top: 14px; font-size: 22px; opacity: .3; }

  /* ─── badges ─── */
  .badge { display: inline-flex; align-items: center; border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
  .badge-high   { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.25); }
  .badge-medium { background: rgba(251,191,36,.13);  color: #fbbf24; border: 1px solid rgba(251,191,36,.22); }
  .badge-low    { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-todo   { background: rgba(156,163,176,.1);  color: #9ca3af; border: 1px solid rgba(156,163,176,.2); }
  .badge-inprog { background: rgba(91,141,238,.15);  color: #5b8dee; border: 1px solid rgba(91,141,238,.25); }
  .badge-review { background: rgba(167,139,250,.15); color: #a78bfa; border: 1px solid rgba(167,139,250,.25); }
  .badge-done   { background: rgba(52,211,153,.13);  color: #34d399; border: 1px solid rgba(52,211,153,.22); }
  .badge-overdue{ background: rgba(248,113,113,.2);  color: #f87171; border: 1px solid #f8717144; }

  /* ─── buttons ─── */
  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 9px; font-family: var(--font-body); font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; padding: 10px 20px; font-size: 14px; box-shadow: 0 0 20px rgba(91,141,238,.3); }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); padding: 8px 16px; font-size: 13px; }
  .btn-ghost:hover { background: var(--card); color: var(--text); }
  .btn-danger { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); padding: 7px 14px; font-size: 12px; }
  .btn-success { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.2); padding: 7px 14px; font-size: 12px; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-icon { background: var(--card); border: 1px solid var(--border); color: var(--text2); padding: 8px; border-radius: 8px; cursor:pointer; font-size:14px; transition: all .15s; }
  .btn-icon:hover { background: var(--card2); color: var(--text); }

  /* ─── forms ─── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font-family: var(--font-body);
    font-size: 14px; outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ─── modal ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg);
    width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; padding: 28px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; padding: 4px; line-height:1; }
  .modal-close:hover { color: var(--text); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  /* ─── task rows ─── */
  .task-row {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px;
    transition: all .15s; border-left: 3px solid var(--lc, var(--border));
    cursor: pointer; margin-bottom: 8px;
  }
  .task-row:hover { background: var(--card2); border-color: var(--border2); }
  .task-row-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 14.5px; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 12px; color: var(--text3); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ─── kanban ─── */
  .kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .kanban-col-header { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .kanban-col-title { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .8px; }
  .kanban-count { margin-left: auto; background: var(--card2); border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 700; color: var(--text2); }
  .kanban-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px; margin-bottom: 9px; cursor: pointer; transition: all .15s;
    border-left: 3px solid var(--lc, var(--border));
  }
  .kanban-card:hover { background: var(--card2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .kanban-card-title { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 7px; }
  .kanban-card-meta { font-size: 11px; color: var(--text3); }

  /* ─── drawer (task detail) ─── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 640px;
    background: var(--surface); border-left: 1px solid var(--border2); z-index: 101;
    overflow-y: auto; padding: 28px; animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { transform: translateX(60px); opacity:0; } to { transform: none; opacity:1; } }
  .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

  /* ─── reply thread ─── */
  .reply-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
  .reply-author { font-size: 12px; font-weight: 700; color: var(--accent); }
  .reply-time { font-size: 11px; color: var(--text3); margin-left: 8px; }
  .reply-text { font-size: 13.5px; color: var(--text2); margin-top: 5px; line-height: 1.6; }
  .reply-attachments { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .attach-chip { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--purple); display: flex; align-items: center; gap: 4px; }

  /* ─── charts ─── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .chart-wrap { position: relative; height: 180px; }

  /* ─── progress bar ─── */
  .progress-bar { background: var(--bg); border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .5s ease; }

  /* ─── table ─── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; padding: 8px 0; border-bottom: 1px solid var(--border); text-align: left; }
  .tbl td { padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); font-size: 13px; color: var(--text2); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }

  /* ─── reminder panel ─── */
  .reminder-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
  .reminder-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

  /* ─── user token screen ─── */
  #user-screen { max-width: 520px; margin: 60px auto; text-align: center; }
  .token-box { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 32px; margin-top: 28px; }
  .demo-tokens { margin-top: 18px; background: var(--bg); border-radius: var(--radius); padding: 14px; text-align: left; }
  .demo-token-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .token-val { font-family: monospace; font-size: 12px; color: var(--accent); background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.15); border-radius: 5px; padding: 2px 8px; cursor: pointer; }
  .token-val:hover { background: rgba(91,141,238,.18); }

  /* ─── empty state ─── */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ─── toast ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green); color: #000; padding: 12px 22px; border-radius: 10px;
    font-weight: 600; font-size: 14px; z-index: 9999; transition: transform .3s ease; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── misc ─── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .section-head { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .link-chip { background: rgba(91,141,238,.08); border: 1px solid rgba(91,141,238,.18); border-radius: 8px; padding: 8px 13px; font-size: 12px; color: var(--accent); font-family: monospace; word-break: break-all; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-btn { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .status-btn:hover, .status-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.08); }

  /* ─── switch toggle ─── */
  .switch { position: relative; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 20px; cursor: pointer; transition: .2s; }
  .switch-slider::before { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; left:3px; top:3px; transition:.2s; }
  .switch input:checked + .switch-slider { background: var(--accent); }
  .switch input:checked + .switch-slider::before { transform: translateX(16px); }

  /* ─── animations ─── */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .fade-in { animation: fadeIn .25s ease; }

  /* ─── file upload ─── */
  .file-drop { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .15s; }
  .file-drop:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.04); }

  /* ─── responsive ─── */
  @media (max-width: 900px) {
    #sidebar { width: 60px; }
    .nav-item span, .nav-section, .logo span, .sidebar-mode-label { display: none; }
    .logo { padding: 14px 10px; font-size: 0; }
    .logo img { height: 28px !important; }
    .kanban { grid-template-columns: 1fr 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    #content { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .kanban { grid-template-columns: 1fr; }
    .drawer { max-width: 100%; }
  }
</style>
</head>

function isOverdue(t){
  if(!t.due||t.status==='Done') return false;
  // Compare date strings directly (YYYY-MM-DD) — safe and timezone-neutral
  return t.due < today();
}

// ── toast ──────────────────────────────────────────────────────────────
function toast(msg,color='var(--green)'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color;
  // Use white text for dark/colored backgrounds, black for light
  const lightBg=['var(--green)','var(--amber)'];
  el.style.color=lightBg.includes(color)?'#000':'#fff';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

function refreshOverdueBadge(){
  const n=tasks.filter(t=>isOverdue(t)).length;
  const b=document.getElementById('overdue-badge');
  b.style.display=n?'inline':'none'; b.textContent=n;
}

// ═══════════════════════════════════════════════════════════════════════
//  MODE TOGGLE
// ═══════════════════════════════════════════════════════════════════════
function setMode(m){
  // Prevent switching to admin if not authenticated
  if(m==='admin' && !adminAuthenticated){ showAdminLoginScreen(); return; }
  mode=m;
  document.getElementById('btn-admin-mode').className='btn btn-'+(m==='admin'?'primary':'ghost')+' btn-sm';
  document.getElementById('btn-user-mode').className='btn btn-'+(m==='user'?'primary':'ghost')+' btn-sm';
  document.getElementById('admin-nav').style.display=m==='admin'?'block':'none';
  document.getElementById('btn-new-task').style.display=m==='admin'?'flex':'none';
  document.getElementById('btn-bulk-upload').style.display=m==='admin'?'flex':'none';
  // topbar user info
  const uInfo=document.getElementById('topbar-user-info');
  const uEmailEl=document.getElementById('topbar-user-email');
  const avatar=document.getElementById('topbar-avatar');
  if(m==='user'&&userEmail){
    uInfo.style.display='flex';
    if(uEmailEl) uEmailEl.textContent=userEmail;
    if(avatar){ avatar.textContent=userEmail[0].toUpperCase(); avatar.style.background='linear-gradient(135deg,var(--purple),var(--cyan))'; }
  } else {
    uInfo.style.display='none';
    if(avatar){ avatar.textContent='A'; avatar.style.background='linear-gradient(135deg,var(--accent),var(--purple))'; }
  }
  if(m==='user'){ showPanel('user'); }
  else { showPanel('dashboard'); }
}

// ═══════════════════════════════════════════════════════════════════════
//  PANEL ROUTER
// ═══════════════════════════════════════════════════════════════════════
function showPanel(name){
  // SECURITY: If in user mode, only the 'user' panel is allowed.
  // Any attempt to navigate to admin panels is silently redirected.
  if(mode==='user' && name!=='user'){ name='user'; }
  currentPanel=name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const hit=document.querySelector(`.nav-item[onclick*="${name}"]`);
  if(hit) hit.classList.add('active');
  document.getElementById('btn-new-task').style.display=(mode==='admin'&&name!=='user')?'flex':'none';
  document.getElementById('btn-bulk-upload').style.display=(mode==='admin'&&name!=='user')?'flex':'none';
  const panels={dashboard:renderDashboard,tasks:renderTasks,mytasks:renderMyTasks,kanban:renderKanban,reminders:renderReminders,team:renderTeam,settings:renderSettings,user:renderUser};
  const fn=panels[name];
  if(fn){ document.getElementById('content').innerHTML=''; fn(); }
  const titles={dashboard:'Dashboard',tasks:'All Tasks',mytasks:'My Tasks',kanban:'Kanban Board',reminders:'Reminders',team:'Team',settings:'Settings',user:'My Tasks'};
  document.getElementById('topbar-title').textContent=titles[name]||name;
  refreshOverdueBadge();
}

      backgroundColor:['rgba(156,163,176,.7)','rgba(91,141,238,.7)','rgba(167,139,250,.7)','rgba(52,211,153,.7)'],
      borderWidth:0,hoverOffset:4}]};
    destroyChart('ch-status');

    const weeks=['5w ago','4w ago','3w ago','2w ago','Last wk','This wk'];

let taskFilters={status:'All',priority:'All',search:''};

function renderTasks(){
  if(mode==='user'){showPanel('user');return;}
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">All Tasks</div>
  <div class="panel-sub">${tasks.length} total tasks across all team members</div>
  <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap" class="fade-in">
    <input id="tf-search" class="form-input" style="max-width:280px;padding:9px 13px" placeholder="🔍  Search tasks or members…" value="${taskFilters.search}" oninput="taskFilters.search=this.value;renderTaskRows()"/>
    <select id="tf-status" class="form-select" style="max-width:160px" onchange="taskFilters.status=this.value;renderTaskRows()">
      <option>All</option>${STATUSES.map(s=>`<option${taskFilters.status===s?' selected':''}>${s}</option>`).join('')}
    </select>
    <select id="tf-prio" class="form-select" style="max-width:140px" onchange="taskFilters.priority=this.value;renderTaskRows()">
      <option>All</option>${PRIOS.map(p=>`<option${taskFilters.priority===p?' selected':''}>${p}</option>`).join('')}
    </select>
    <button class="btn btn-ghost btn-sm" onclick="taskFilters={status:'All',priority:'All',search:''};renderTasks()">Reset</button>
  </div>
  <div id="task-rows" class="fade-in"></div>`;
  renderTaskRows();
}

function renderTaskRows(){
  const filtered=tasks.filter(t=>{
    const ss=taskFilters.status==='All'||t.status===taskFilters.status;
    const sp=taskFilters.priority==='All'||t.priority===taskFilters.priority;
    const sq=!taskFilters.search||t.title.toLowerCase().includes(taskFilters.search.toLowerCase())||t.assignee.toLowerCase().includes(taskFilters.search.toLowerCase());
    return ss&&sp&&sq;
  });
  const el=document.getElementById('task-rows');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>No tasks match your filters</div></div>';return;}
  el.innerHTML=filtered.map(t=>`
    <div class="task-row" style="--lc:${PRIO_COLOR[t.priority]}" onclick="openDrawer('${t.id}')">
      <div class="task-row-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span>👤 ${t.assignee}</span>
          <span>📅 <span style="color:${isOverdue(t)?'var(--red)':'inherit'}">${fmt(t.due)}</span></span>
          ${t.replies.length?`<span>💬 ${t.replies.length}</span>`:''}
          ${t.attachments.length?`<span>📎 ${t.attachments.length}</span>`:''}
          ${t.reminder!=='none'?`<span>🔔 ${t.reminder}</span>`:''}
          ${t.tags&&t.tags.length?t.tags.map(tag=>`<span style="background:rgba(91,141,238,.1);color:var(--accent);border:1px solid rgba(91,141,238,.2);border-radius:4px;padding:1px 6px;font-size:10px">${tag}</span>`).join(''):''}
        </div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        <span class="badge ${prioBadgeClass(t.priority)}">${t.priority}</span>
        <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
        ${isOverdue(t)?'<span class="badge badge-overdue">Overdue</span>':''}
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.id}')">✏ Edit</button>
        <button class="btn btn-success btn-sm" title="Send email to assignee" onclick="sendMailtoEmail('${t.id}')">📧</button>
      </div>
    </div>`).join('');
}

function deleteTask(id){
  if(!confirm('Delete this task permanently?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveTasks(); refreshOverdueBadge();
  // Close drawer if it was showing the deleted task
  if(activeDrawerTask&&activeDrawerTask.id===id) closeDrawer();
  else renderTaskRows();
  toast('Task deleted','var(--red)');
}

// ═══════════════════════════════════════════════════════════════════════
//  TEAM
// ═══════════════════════════════════════════════════════════════════════
function renderTeam(){
  if(mode==='user'){showPanel('user');return;}
  // Normalise to lowercase so mixed-case duplicates are merged
  const uniqueEmails=[...new Set(tasks.map(t=>t.assignee.toLowerCase()))];
  const members=uniqueEmails.map(email=>{
    const myTasks=tasks.filter(t=>t.assignee.toLowerCase()===email);
    return{email,total:myTasks.length,done:myTasks.filter(t=>t.status==='Done').length,inprog:myTasks.filter(t=>t.status==='In Progress').length,overdue:myTasks.filter(isOverdue).length};
  });
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="panel-title fade-in">Team Overview</div>
  <div class="panel-sub">${members.length} active members across all projects</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px" class="fade-in">
  ${members.map(m=>{
    const pct=m.total?Math.round(m.done/m.total*100):0;
    const initials=m.email.slice(0,2).toUpperCase();
    const colors=['var(--accent)','var(--purple)','var(--green)','var(--amber)','var(--cyan)'];
    const color=colors[m.email.charCodeAt(0)%colors.length];

// ── Build self-contained assignee link ────────────────────────────────
// Encodes ALL of this person's tasks into the URL as base64 JSON
// so the link works in ANY browser — no localStorage needed on the recipient's side
function buildAssigneeLink(assigneeEmail){
  const base = window.location.href.split('?')[0];
  const assigneeTasks = tasks.filter(t => t.assignee.toLowerCase() === assigneeEmail.toLowerCase());
  const payload = { email: assigneeEmail, tasks: assigneeTasks };
  try {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    return base + '?data=' + encoded;
  } catch(e) {
    // Fallback to email param if encoding fails (very large task lists)
    return base + '?email=' + encodeURIComponent(assigneeEmail);
  }
}

// ── Email sending via EmailJS ──────────────────────────────────────────
// ✏️  PASTE YOUR EMAILJS CREDENTIALS HERE FOR PERMANENT STORAGE:
const EMAILJS_SERVICE_ID  = '';   // e.g. 'service_abc123'
const EMAILJS_TEMPLATE_ID = '';   // e.g. 'template_xyz456'
const EMAILJS_PUBLIC_KEY  = '';   // e.g. 'aBcDeFgHiJkLmNoPq'

function getEmailConfig(){
  return{
    service:  localStorage.getItem('ejs_service')  || EMAILJS_SERVICE_ID,
    template: localStorage.getItem('ejs_template') || EMAILJS_TEMPLATE_ID,
    key:      localStorage.getItem('ejs_key')      || EMAILJS_PUBLIC_KEY
  };
}

async function sendTaskEmail(task, reason='assigned', extra={}){
  const cfg=getEmailConfig();
  if(!cfg.service||!cfg.template||!cfg.key){
    console.warn('EmailJS not configured');
    return false;
  }
  emailjs.init(cfg.key);
  const taskLink=buildAssigneeLink(task.assignee);
  // Human-readable subject line based on reason
  const reasonLabels={
    assigned:   'Task Assigned to You',
    updated:    'Task Updated',
    date_change:'Due Date Changed',
    priority_change:'Priority Changed',
    status_change:'Status Changed',
    reminder:   'Task Reminder',
    test:       'Test Email'
  };
  const changeDetail = extra.changeDetail || '';
  try{
    await emailjs.send(cfg.service, cfg.template, {
      to_email:     task.assignee,
      to_name:      task.assignee.split('@')[0],
      task_title:   task.title,
      task_desc:    task.desc||'No description provided.',
      task_link:    taskLink,
      due_date:     fmt(task.due),
      priority:     task.priority,
      status:       task.status,
      reminder:     task.reminder,
      reason:       reason,
      reason_label: reasonLabels[reason]||reason,
      change_detail:changeDetail,
      from_name:    'POLYPLASTICS Task Manager'
    });
    return true;
  }catch(e){
    console.error('EmailJS error',e);
    return false;
  }
}

// Central notification dispatcher — tries EmailJS first, falls back to mailto
async function notifyAssignee(task, reason, extra={}){
  const cfg=getEmailConfig();
  const taskLink=buildAssigneeLink(task.assignee);
  if(cfg.service&&cfg.template&&cfg.key){
    const ok=await sendTaskEmail(task, reason, extra);
    if(ok){
      const labels={assigned:'assigned',updated:'updated',date_change:'date-change notified',
                    priority_change:'priority-change notified',status_change:'status-change notified'};
      toast('📧 Email sent to '+task.assignee+' ('+( labels[reason]||reason )+')'  );
      return;
    }
  }
  // Fallback: open mail client
  openMailtoFallback(task, taskLink, reason, extra.changeDetail||'');
}

// ── mailto email (zero-config fallback) ──────────────────────────────
function sendMailtoEmail(taskId){
  const t=getTask(taskId);
  if(!t){toast('Task not found','var(--red)');return;}
  const taskLink=buildAssigneeLink(t.assignee);
  const cfg=getEmailConfig();
  // Try EmailJS first if configured
  if(cfg.service&&cfg.template&&cfg.key){
    sendTaskEmail(t,'assigned').then(ok=>{
      if(ok) toast('📧 Email sent via EmailJS to '+t.assignee+'!');
      else openMailtoFallback(t,taskLink);
    });
    return;
  }
  // Fallback: open mail client
  openMailtoFallback(t, taskLink, 'assigned');
}

function openMailtoFallback(t, taskLink, reason, changeDetail){
  reason=reason||'assigned';
  changeDetail=changeDetail||'';
  const subjectMap={
    assigned:        '[POLYPLASTICS] Task Assigned: '+t.title,
    updated:         '[POLYPLASTICS] Task Updated: '+t.title,
    date_change:     '[POLYPLASTICS] Due Date Changed: '+t.title,
    priority_change: '[POLYPLASTICS] Priority Changed: '+t.title,
    status_change:   '[POLYPLASTICS] Status Changed: '+t.title,
    reminder:        '[POLYPLASTICS] Reminder: '+t.title,
  };
  const introMap={
    assigned:        'A task has been assigned to you.',
    updated:         'A task assigned to you has been updated.',
    date_change:     'The due date of your task has been changed.',
    priority_change: 'The priority of your task has been changed.',
    status_change:   'The status of your task has been changed.',
    reminder:        'This is a reminder about your pending task.',
  };
  const subject=encodeURIComponent(subjectMap[reason]||subjectMap.assigned);
  const changeBlock=changeDetail?'🔄 Change:     '+changeDetail+'\n':'';
  const body=encodeURIComponent(
`Hi ${t.assignee.split('@')[0]},

${introMap[reason]||introMap.assigned}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 Task:      ${t.title}
${changeBlock}📅 Due Date:  ${fmt(t.due)}
⚡ Priority:  ${t.priority}
📊 Status:    ${t.status}
🔔 Reminder:  ${t.reminder}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${t.desc?'📝 Description:\n'+t.desc+'\n\n':''}
🔗 Click to view your tasks (no account needed):
${taskLink}

Regards,
POLYPLASTICS Task Manager`
  );
  window.open('mailto:'+t.assignee+'?subject='+subject+'&body='+body);
  toast('📧 Mail client opened for '+t.assignee);
}

async function sendAllReminders(){
  const cfg=getEmailConfig();
  if(!cfg.service||!cfg.template||!cfg.key){
    toast('Configure EmailJS in Settings first','var(--amber)');
    return;
  }
  const active=tasks.filter(t=>t.reminder!=='none'&&t.status!=='Done');
  if(!active.length){toast('No active reminders to send','var(--amber)');return;}
  toast('Sending '+active.length+' reminder emails…','var(--accent)');
  let sent=0,failed=0;
  for(const t of active){
    const ok=await sendTaskEmail(t,'reminder');
    if(ok) sent++; else failed++;
  }
  if(failed===0) toast(`✅ All ${sent} reminder emails sent!`);
  else toast(`Sent ${sent}/${active.length} emails. ${failed} failed — check console.`,'var(--amber)');
}

  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='taskflow-backup.json'; a.click();
  toast('Tasks exported!');
}

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const fr=new FileReader(); fr.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!Array.isArray(imported)){toast('Invalid format: expected an array of tasks','var(--red)');return;}
        tasks=imported; saveTasks(); showPanel('dashboard'); toast('Tasks imported successfully!');
      }catch{toast('Invalid JSON file — could not parse','var(--red)');}
    };fr.readAsText(e.target.files[0]);
  };inp.click();
}

function resetData(){
  if(!confirm('Reset all tasks to demo data? This cannot be undone.'))return;
  tasks=JSON.parse(JSON.stringify(SEED)).map(t=>({...t,id:uid(),token:uid()}));
  saveTasks(); showPanel('dashboard'); toast('Reset to demo data');
}

function userLogin(){

// ── User: email task details to themselves ────────────────────────────
function sendUserTaskEmail(taskId){
  const t=tasks.find(x=>x.id===taskId);
  if(!t){toast('Task not found','var(--red)');return;}
  const cfg=getEmailConfig();
  const taskLink=buildAssigneeLink(t.assignee);
  // Try EmailJS if configured
  if(cfg.service&&cfg.template&&cfg.key){
    sendTaskEmail(t,'reminder').then(ok=>{
      if(ok) toast('📧 Task details emailed to '+t.assignee+'!');
      else openUserMailtoFallback(t,taskLink);
    });
    return;
  }
  openUserMailtoFallback(t,taskLink);
}

function openUserMailtoFallback(t,taskLink){
  const subject=encodeURIComponent('[POLYPLASTICS] Your Task: '+t.title);
  const overdueNote=isOverdue(t)?'\n⚠️  This task is OVERDUE — please update your status.\n':'';
  const body=encodeURIComponent(
`Hi ${t.assignee.split('@')[0]},

Here are the details for your assigned task on POLYPLASTICS Task Manager.
${overdueNote}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 Task:      ${t.title}
📅 Due Date:  ${fmt(t.due)}
⚡ Priority:  ${t.priority}
📊 Status:    ${t.status}
🔔 Reminder:  ${t.reminder}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${t.desc?'📝 Description:\n'+t.desc+'\n\n':''}🏷 Tags: ${t.tags&&t.tags.length?t.tags.join(', '):'None'}

🔗 View your tasks (no account needed):
${taskLink}

Regards,
POLYPLASTICS Task Manager`
  );

function userUpdateStatus(s){
  if(!userTask)return;
  // Re-read fresh from tasks array in case admin changed it
  const fresh=tasks.find(x=>x.id===userTask.id);
  if(!fresh){
    toast('This task was removed by the admin','var(--red)');
    userTask=null;
    renderUserDashboard(document.getElementById('content'));
    return;
  }
  userTask={...fresh,status:s};
  updateTask(userTask);
  toast('Status updated to: '+s);
  renderUserTask(document.getElementById('content'));
}

function handleUserFiles(input){
  const files=Array.from(input.files);
  pendingFiles=[...pendingFiles,...files];
  document.getElementById('user-file-list').innerHTML=pendingFiles.map((f,i)=>
    `<div class="attach-chip">📎 ${f.name} <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="removePendingFile(${i})">✕</span></div>`
  ).join('');
}

function removePendingFile(i){
  pendingFiles.splice(i,1);
  const listEl=document.getElementById('user-file-list');
  if(listEl) listEl.innerHTML=pendingFiles.map((f,idx)=>
    `<div class="attach-chip">📎 ${f.name} <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="removePendingFile(${idx})">✕</span></div>`
  ).join('');
}

function submitUserReply(){
  const text=document.getElementById('user-reply-text').value.trim();
  if(!text&&pendingFiles.length===0){toast('Please write a reply or attach a file','var(--amber)');return;}
  // Re-read fresh from tasks array in case admin edited or deleted it
  const fresh=tasks.find(x=>x.id===userTask.id);
  if(!fresh){
    toast('This task was removed by the admin','var(--red)');
    userTask=null;
    renderUserDashboard(document.getElementById('content'));
    return;
  }
  const reply={
    id:uid(),
    author:userTask.assignee,
    text,
    time:new Date().toISOString(),
    attachments:pendingFiles.map(f=>({name:f.name,size:f.size,type:f.type}))
  };
  userTask={...fresh,replies:[...fresh.replies,reply]};
  updateTask(userTask);
  pendingFiles=[];
  toast('Reply submitted successfully!');
  renderUserTask(document.getElementById('content'));
}

//  TASK DRAWER (detail panel)
// ═══════════════════════════════════════════════════════════════════════
function openDrawer(id){
  const fresh=getTask(id);
  if(!fresh){toast('Task not found or was deleted','var(--red)');return;}
  activeDrawerTask=fresh;
  const overlay=document.createElement('div');
  overlay.className='drawer-overlay'; overlay.id='drawer-overlay';
  overlay.onclick=closeDrawer;
  const drawer=document.createElement('div');
  drawer.className='drawer'; drawer.id='task-drawer';
  document.body.appendChild(overlay);
  document.body.appendChild(drawer);
  renderDrawerContent();
}

function closeDrawer(){
  document.getElementById('drawer-overlay')?.remove();
  document.getElementById('task-drawer')?.remove();
  activeDrawerTask=null;
  pendingFiles=[];
  // Refresh the current view so any deletions/edits made in the drawer are reflected
  if(mode==='user'){
    // In user mode, refresh the user dashboard (tasks list) or task detail
    const c=document.getElementById('content');
    if(userTask){
      const fresh=tasks.find(t=>t.id===userTask.id);
      if(fresh) renderUserTask(c);
      else renderUserDashboard(c);
    } else {
      renderUserDashboard(c);
    }
  } else {
    // Admin mode — refresh the current panel
    const taskRows=document.getElementById('task-rows');
    if(currentPanel==='tasks'&&taskRows) renderTaskRows();
    else if(currentPanel==='kanban') renderKanban();
    else if(currentPanel==='dashboard') renderDashboard();
    else if(currentPanel==='mytasks') renderMyTasks();
  }
}

function changeAdminPassword(){
  const current=document.getElementById('pwd-current').value;
  const newPwd=document.getElementById('pwd-new').value;
  const confirm=document.getElementById('pwd-confirm').value;
  const stored=localStorage.getItem('admin_password')||'admin123';
  const statusEl=document.getElementById('pwd-status');
  if(current!==stored){statusEl.style.color='var(--red)';statusEl.textContent='❌ Current password is incorrect';return;}
  if(newPwd.length<6){statusEl.style.color='var(--red)';statusEl.textContent='❌ New password must be at least 6 characters';return;}
  if(newPwd!==confirm){statusEl.style.color='var(--red)';statusEl.textContent='❌ Passwords do not match';return;}
  localStorage.setItem('admin_password',newPwd);
  statusEl.style.color='var(--green)';statusEl.textContent='✅ Password updated successfully';
  document.getElementById('pwd-current').value='';
  document.getElementById('pwd-new').value='';
  document.getElementById('pwd-confirm').value='';
  toast('Admin password updated!');
}

function editFromDrawer(id){
  closeDrawer();
  setTimeout(()=>{ editTaskId=id; openTaskModal(); },50);
}

function deleteTaskFromDrawer(id){
  if(!confirm('Delete this task permanently? This cannot be undone.'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveTasks(); refreshOverdueBadge();
  closeDrawer();
  toast('Task deleted','var(--red)');
  // If user mode is active and they were viewing this task, reset to dashboard
  if(mode==='user'&&userTask&&userTask.id===id){
    userTask=null;
    renderUserDashboard(document.getElementById('content'));
  } else {
    showPanel(currentPanel);
  }
}

function changeDrawerStatus(s){
  const prev=activeDrawerTask.status;
  // Re-read fresh copy before writing to avoid overwriting concurrent changes
  const fresh=getTask(activeDrawerTask.id);
  if(!fresh){ toast('Task no longer exists','var(--red)'); closeDrawer(); return; }
  activeDrawerTask={...fresh,status:s};
  updateTask(activeDrawerTask);
  renderDrawerContent();
  refreshOverdueBadge();
  // Notify assignee of the status change
  if(s!==prev) notifyAssignee(activeDrawerTask,'status_change',{changeDetail:'Status → '+s+' (was '+prev+')'});
}

function handleDrawerFiles(input){
  const files=Array.from(input.files);
  pendingFiles=[...pendingFiles,...files];
  document.getElementById('drawer-file-list').innerHTML=pendingFiles.map(f=>`<div class="attach-chip">📎 ${f.name}</div>`).join('');
}

function submitDrawerReply(){
  const text=document.getElementById('drawer-reply-text').value.trim();
  if(!text&&pendingFiles.length===0){toast('Please write a reply or attach a file','var(--amber)');return;}
  const fresh=getTask(activeDrawerTask.id);
  if(!fresh){ toast('Task no longer exists','var(--red)'); closeDrawer(); return; }
  const reply={id:uid(),author:'Admin',text,time:new Date().toISOString(),attachments:pendingFiles.map(f=>({name:f.name,size:f.size}))};
  activeDrawerTask={...fresh,replies:[...fresh.replies,reply]};
  updateTask(activeDrawerTask);
  pendingFiles=[];
  toast('Reply sent!');
  renderDrawerContent();
}

function copyLink(token){
  const url=window.location.href.split('?')[0]+'?token='+token;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast('Link copied to clipboard!')).catch(()=>{prompt('Copy this link:',url);});
  } else {
    prompt('Copy this link:',url);
  }
}

function copyAssigneeLink(email){
  const url=buildAssigneeLink(email);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast('Assignee link copied! Share with '+email)).catch(()=>{prompt('Copy this link:',url);});
  } else {
    prompt('Copy this link:',url);
  }
}

function closeTaskModal(){ document.getElementById('task-modal-overlay')?.remove(); }

function saveTask(){
  const title=document.getElementById('tm-title').value.trim();
  const assignee=document.getElementById('tm-assignee').value.trim();
  const due=document.getElementById('tm-due').value;
  if(!title||!assignee||!due){toast('Title, email & due date are required','var(--red)');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(assignee)){toast('Please enter a valid email address','var(--red)');return;}
  const tags=document.getElementById('tm-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(editTaskId){
    const t=getTask(editTaskId);
    const newPriority=document.getElementById('tm-priority').value;
    const newStatus=document.getElementById('tm-status').value;
    const updated={...t,title,desc:document.getElementById('tm-desc').value,assignee,priority:newPriority,status:newStatus,due,reminder:document.getElementById('tm-reminder').value,tags};
    updateTask(updated);
    // ── Auto-notify assignee of what changed ───────────────────────
    const changes=[];
    if(assignee!==t.assignee)         changes.push({reason:'assigned',     detail:'Reassigned to '+assignee});
    if(due!==t.due)                   changes.push({reason:'date_change',  detail:'Due date → '+fmt(due)});
    if(newPriority!==t.priority)      changes.push({reason:'priority_change',detail:'Priority → '+newPriority});
    if(newStatus!==t.status)          changes.push({reason:'status_change', detail:'Status → '+newStatus});
    if(changes.length===0 && (title!==t.title||document.getElementById('tm-desc').value!==t.desc))
      changes.push({reason:'updated', detail:'Task details updated'});
    // Send one email per changed field (or a single "updated" email)
    changes.forEach(({reason,detail})=>notifyAssignee(updated, reason, {changeDetail:detail}));
    if(changes.length===0) toast('Task updated (no changes to notify).');
  } else {
    const nt={id:uid(),title,desc:document.getElementById('tm-desc').value,assignee,priority:document.getElementById('tm-priority').value,status:document.getElementById('tm-status').value,due,created:today(),token:uid(),replies:[],attachments:[],reminder:document.getElementById('tm-reminder').value,tags};
    tasks=[nt,...tasks]; saveTasks();
    const cfg=getEmailConfig();
    if(cfg.service&&cfg.template&&cfg.key){
      // EmailJS configured — send automatically
      sendTaskEmail(nt,'assigned').then(ok=>{
        if(ok) toast('✅ Task created & email sent to '+assignee+'!');
        else {
          toast('Task created! Opening mail client…','var(--amber)');
          const taskLink=buildAssigneeLink(nt.assignee);
          openMailtoFallback(nt,taskLink);
        }
      });
    } else {
      // No EmailJS — automatically open mailto (pre-filled email) right away
      toast('Task created! Opening mail client for '+assignee+'…','var(--accent)');
      const taskLink=buildAssigneeLink(nt.assignee);
      openMailtoFallback(nt,taskLink);
    }
  }
  closeTaskModal(); refreshOverdueBadge();
  showPanel(currentPanel);
}

function checkUrlToken(){
  const params=new URLSearchParams(window.location.search);
  const dataParam=params.get('data');
  const token=params.get('token');
  const emailParam=params.get('email');

  // PRIMARY: ?data= — self-contained link with embedded tasks
  // Encodes all assignee tasks in the URL so the link works in ANY browser
  // regardless of localStorage state. Fixes "tasks show as 0" bug.
  if(dataParam){
    try{
      const payload=JSON.parse(decodeURIComponent(escape(atob(dataParam))));
      if(payload&&payload.email&&Array.isArray(payload.tasks)){
        // Merge strategy: update existing tasks from payload, but NEVER re-insert
        // tasks that have been deleted from the admin's localStorage (the source of truth).
        // We only update tasks whose IDs already exist in the current tasks array.
        const existingIds=new Set(tasks.map(t=>t.id));
        const incoming=payload.tasks;
        // Update tasks that exist locally with newer data from payload
        const updatedTasks=tasks.map(t=>{ const m=incoming.find(x=>x.id===t.id); return m||t; });
        // Only add incoming tasks that do NOT exist locally at all
        // (never re-add a task that was deleted — if it was in existingIds it stays deleted)
        incoming.forEach(t=>{ if(!existingIds.has(t.id)) updatedTasks.push(t); });
        tasks=updatedTasks;
        saveTasks();
        userEmail=payload.email;
        mode='user';
        return;
      }
    }catch(e){ console.warn('Failed to decode ?data= param:',e); }
  }

  // LEGACY: ?email= param (still supported as fallback)
  if(emailParam){
    const decoded=decodeURIComponent(emailParam).trim();
    if(decoded){ userEmail=decoded; mode='user'; return; }
  }

  // ?token= deep-link — specific task by token
  if(token){
    const found=tasks.find(t=>t.token===token)||tasks.find(t=>t.token&&t.token.toLowerCase()===token.toLowerCase());
    // Store only the id so renderUserTask always re-fetches a fresh copy
    if(found){ userEmail=found.assignee; userTask={id:found.id}; mode='user'; return; }
  }
}

  c.innerHTML=`
  <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;">My Tasks</div>

    <span>Identity: <strong style="color:var(--text)">${selfName}</strong> &lt;${selfEmail}&gt;</span>
    <button class="btn btn-ghost btn-sm" onclick="localStorage.removeItem('self_email');localStorage.removeItem('self_name');renderMyTasks()">Change Identity</button>
  </div>`:''}

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:22px;">

function renderMyTaskList(selfEmail){
  const el=document.getElementById('my-task-list');
  if(!el) return;
  const STATUS_COL={'To Do':'var(--text3)','In Progress':'var(--cyan)','Review':'var(--purple)','Done':'var(--green)'};
  const myT=tasks.filter(t=>t.assignee.toLowerCase()===(selfEmail||'').toLowerCase())
    .sort((a,b)=>{
      const ao=isOverdue(a)?0:(['To Do','In Progress','Review','Done'].indexOf(a.status)+1||9);
      const bo=isOverdue(b)?0:(['To Do','In Progress','Review','Done'].indexOf(b.status)+1||9);
      return ao-bo||(a.due||'').localeCompare(b.due||'');
    });
  if(!myT.length){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3);">No tasks yet. Click <strong>+ Add My Task</strong> to create one.</div>`;
    return;
  }
  el.innerHTML=myT.map(t=>{
    const ov=isOverdue(t);
    const col=ov?'var(--red)':(STATUS_COL[t.status]||'var(--text3)');
    return `<div class="task-row" style="border-left:3px solid ${col}">
      <div class="task-row-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span style="color:${col};font-weight:600;">${ov?'⚠ OVERDUE':t.status}</span>
          <span>📅 ${fmt(t.due)}</span>
          <span>${(PRIO_ICONS&&PRIO_ICONS[t.priority])||''} ${t.priority}</span>
          ${t.tags&&t.tags.length?`<span>🏷 ${t.tags.join(', ')}</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        <button class="btn btn-ghost btn-sm" title="Edit" onclick="openSelfTaskModal('${t.id}')">✏</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--cyan)" title="Next status" onclick="quickStatusCycle('${t.id}')">▶</button>
        <button class="btn btn-ghost btn-sm" onclick="openDrawer('${t.id}')">👁</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteMyTask('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function saveSelfIdentity(){
  const name=(document.getElementById('self-name-inp')?.value||'').trim();
  const email=(document.getElementById('self-email-inp')?.value||'').trim();
  if(!name||!email){toast('Please enter both name and email','var(--red)');return;}
  localStorage.setItem('self_name',name);
  localStorage.setItem('self_email',email);
  toast('Identity saved!');
  showPanel('mytasks');
}

function quickStatusCycle(id){
  const t=getTask(id); if(!t) return;
  const cycle=['To Do','In Progress','Review','Done'];
  const next=cycle[(cycle.indexOf(t.status)+1)%cycle.length];
  updateTask({...t,status:next});
  const se=mode==='user'?(userEmail||''):(localStorage.getItem('self_email')||'');
  renderMyTaskList(se);
  toast('Status → '+next);
}

function deleteMyTask(id){
  if(!confirm('Delete this task?')) return;
  tasks=tasks.filter(t=>t.id!==id); saveTasks();
  // Close drawer if it was showing the deleted task
  if(activeDrawerTask&&activeDrawerTask.id===id) closeDrawer();
  const se=mode==='user'?(userEmail||''):(localStorage.getItem('self_email')||'');
  renderMyTaskList(se); refreshOverdueBadge(); toast('Deleted');
}

      <div class="form-group"><label class="form-label">Priority</label>
        <select id="st-priority" class="form-select">${PRIOS.map(p=>`<option${t&&t.priority===p?' selected':''}>${p}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Status</label>
        <select id="st-status" class="form-select">${STATUSES.map(s=>`<option${t&&t.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Due Date *</label>

      <div class="form-group"><label class="form-label">Reminder</label>

function closeSelfTaskModal(){ document.getElementById('stm-overlay')?.remove(); }

function saveSelfTask(editId,selfEmail){
  const title=(document.getElementById('st-title')?.value||'').trim();
  const due=document.getElementById('st-due')?.value||'';
  if(!title||!due){toast('Title and due date are required','var(--red)');return;}
  const tags=(document.getElementById('st-tags')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(editId){
    const t=getTask(editId);
    if(!t){toast('Task not found — it may have been deleted','var(--red)');closeSelfTaskModal();return;}
    updateTask({...t,title,desc:document.getElementById('st-desc').value,
      priority:document.getElementById('st-priority').value,
      status:document.getElementById('st-status').value,
      due,reminder:document.getElementById('st-reminder').value,tags});
    toast('Task updated ✅');
  } else {
    const nt={id:uid(),title,desc:document.getElementById('st-desc').value,
      assignee:selfEmail,priority:document.getElementById('st-priority').value,
      status:document.getElementById('st-status').value,
      due,created:today(),token:uid(),replies:[],attachments:[],
      reminder:document.getElementById('st-reminder').value,tags};
    tasks=[nt,...tasks]; saveTasks();
    toast('Task added ✅ — no email sent');
  }
  closeSelfTaskModal(); refreshOverdueBadge(); renderMyTaskList(selfEmail);
}

function handleBulkDrop(e, type){
  e.preventDefault();
  document.getElementById('bulk-'+type+'-drop').style.borderColor='';
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('bulk-'+type+'-text').value = ev.target.result;
  };
  reader.readAsText(file);
}

function handleBulkFileInput(e, type){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('bulk-'+type+'-text').value = ev.target.result;
  };
  reader.readAsText(file);
}

function parseBulkCSV(text){
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return {tasks:[],errors:['No data found.']};
  // parse header
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_').replace(/"/g,''));
  const tasks=[], errors=[];
  for(let i=1;i<lines.length;i++){
    const cols = parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{ row[h]=cols[idx]||''; });
    const err = validateBulkRow(row, i);
    if(err){ errors.push(err); continue; }
    tasks.push(buildBulkTask(row));
  }
  return {tasks,errors};
}

function parseCSVLine(line){
  const result=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result.map(v=>v.replace(/^"|"$/g,'').trim());
}

function parseBulkJSON(text){
  let arr;
  const tasks=[],errors=[];
  try{ arr=JSON.parse(text.trim()); } catch(e){ return {tasks:[],errors:['Invalid JSON: '+e.message]}; }
  if(!Array.isArray(arr)) return {tasks:[],errors:['JSON must be an array of task objects.']};
  arr.forEach((row,i)=>{
    // normalise keys to lowercase
    const norm={};
    Object.keys(row).forEach(k=>{ norm[k.toLowerCase().replace(/\s+/g,'_')]=row[k]; });
    // map description/desc
    if(norm.description!==undefined&&norm.desc===undefined) norm.desc=norm.description;
    const err=validateBulkRow(norm,i+1);
    if(err){ errors.push(err); return; }
    tasks.push(buildBulkTask(norm));
  });
  return {tasks,errors};
}

function validateBulkRow(row, rowNum){
  const title=(row.title||row.task_title||'').trim();
  const assignee=(row.assignee||row.email||row.assigned_to||'').trim();
  const due=(row.due||row.due_date||row.deadline||'').trim();
  if(!title)    return `Row ${rowNum}: Missing "title"`;
  if(!assignee) return `Row ${rowNum}: Missing "assignee" email`;
  if(!due)      return `Row ${rowNum}: Missing "due" date`;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(due)) return `Row ${rowNum}: "due" must be YYYY-MM-DD format (got: ${due})`;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(assignee)) return `Row ${rowNum}: Invalid email "${assignee}"`;
  return null;
}

function buildBulkTask(row){
  const validPrios=['High','Medium','Low'];
  const validStatuses=['To Do','In Progress','Review','Done'];
  const prio = validPrios.find(p=>p.toLowerCase()===(row.priority||'').toLowerCase()) || 'Medium';
  const status = validStatuses.find(s=>s.toLowerCase()===(row.status||'').toLowerCase()) || 'To Do';
  const rawTags = row.tags||row.tag||'';
  const tags = Array.isArray(rawTags)
    ? rawTags.map(t=>t.trim()).filter(Boolean)
    : rawTags.split(/[;|]|(?<![a-z]),/i).map(t=>t.trim()).filter(Boolean);
  return {
    id: uid(),
    title: (row.title||row.task_title||'').trim(),
    desc: (row.description||row.desc||'').trim(),
    assignee: (row.assignee||row.email||row.assigned_to||'').trim(),
    priority: prio,
    status: status,
    due: (row.due||row.due_date||row.deadline||'').trim(),
    created: today(),
    token: uid(),
    replies: [],
    attachments: [],
    reminder: row.reminder||'none',
    tags: tags
  };
}

function previewBulk(){
  const parsed = _bulkTab==='csv'
    ? parseBulkCSV(document.getElementById('bulk-csv-text').value)
    : parseBulkJSON(document.getElementById('bulk-json-text').value);

  const preview = document.getElementById('bulk-preview');
  const countEl = document.getElementById('bulk-preview-count');
  const rows = document.getElementById('bulk-preview-rows');
  const errs = document.getElementById('bulk-preview-errors');
  preview.style.display='block';

  countEl.textContent = `(${parsed.tasks.length} valid task${parsed.tasks.length!==1?'s':''})`;

  if(parsed.tasks.length){
    rows.innerHTML = parsed.tasks.map(t=>`
      <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;">
        <span class="badge ${prioBadgeClass(t.priority)}" style="flex-shrink:0">${t.priority}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}</div>
          <div style="font-size:11px;color:var(--text3);">${esc(t.assignee)} · Due ${fmt(t.due)}</div>
        </div>
        <span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>
      </div>`).join('');
  } else {
    rows.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px;">No valid tasks to preview.</div>';
  }

  if(parsed.errors.length){
    errs.innerHTML = `<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;">⚠ ${parsed.errors.length} issue${parsed.errors.length!==1?'s':''} found</div>
      ${parsed.errors.map(e=>`<div style="font-size:12px;color:var(--red);margin-bottom:2px;">${esc(e)}</div>`).join('')}
    </div>`;
  } else {
    errs.innerHTML='';
  }
}

function importBulk(){
  const parsed = _bulkTab==='csv'
    ? parseBulkCSV(document.getElementById('bulk-csv-text').value)
    : parseBulkJSON(document.getElementById('bulk-json-text').value);

  if(!parsed.tasks.length){
    toast('No valid tasks to import. Fix errors first.','var(--red)');
    previewBulk();
    return;
  }
  tasks = [...parsed.tasks, ...tasks];
  saveTasks();
  closeBulkModal();
  refreshOverdueBadge();
  showPanel(currentPanel);
  toast(`✅ ${parsed.tasks.length} task${parsed.tasks.length!==1?'s':''} imported!`);
}
